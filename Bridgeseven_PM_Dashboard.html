const getMonday = (dateStr) => {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const day = d.getDay() || 7;
  if (day !== 1) d.setDate(d.getDate() - (day - 1));
  return d.toISOString().slice(0, 10);
};

const formatWeekLabel = (mondayStr) => {
  if (!mondayStr) return "";
  const monday = new Date(mondayStr);
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
  return `${monday.getFullYear()} ${fmt(monday)} ~ ${fmt(sunday)}`;
};

const daysBetween = (a, b) => {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / (1000 * 60 * 60 * 24));
};

  const [filterStatus, setFilterStatus] = useState("");
  const [filterType, setFilterType] = useState("");
  const [drawerProject, setDrawerProject] = useState(null);
  const [personDrawer, setPersonDrawer] = useState(null);   // {name, role}
  const [statusDetail, setStatusDetail] = useState(null);   // status string
  const [dashboardFilter, setDashboardFilter] = useState("active"); // active | uat
  const [overdueModal, setOverdueModal] = useState(false);
  const [syncStatus, setSyncStatus] = useState(FIREBASE_ENABLED ? "connecting" : "local");
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  // 원격 → 로컬 setState 시 다시 원격으로 echo 방지용 플래그
  const fromRemote = useRef({ projects: false, meetings: false, teams: false, members: false });
  // 최초 마운트 시 초기값 푸시 방지 (Firebase 데이터를 덮어쓰지 않도록)
  const isInitialMount = useRef({ projects: true, meetings: true, teams: true, members: true });
  const [isRepMode, setIsRepMode] = useState(false);
  const [showRepLogin, setShowRepLogin] = useState(false);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  // 항상 최신 project를 drawer에 반영
  const liveDrawerProject = drawerProject ? projects.find(p => p.id === drawerProject.id) : null;

  // localStorage 자동 저장/복원 (Firebase 모드가 아닐 때만)
  useEffect(() => {
    if (FIREBASE_ENABLED) return;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.projects) setProjects(migrateProjects(data.projects));
        if (data.meetings) setMeetings(migrateMeetings(data.meetings));
        if (data.teams) setTeams(data.teams);
        if (data.members) setMembers(data.members);
      }
    } catch {}
  }, []);

  useEffect(() => {
    if (FIREBASE_ENABLED) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, meetings, teams, members, savedAt: new Date().toISOString() }));
    } catch {}
  }, [projects, meetings, teams, members]);

  // Firebase 실시간 동기화 (양방향)
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbDb) return;
    const setters = { projects: setProjects, meetings: setMeetings, teams: setTeams, members: setMembers };
    const migrators = {
      projects: migrateProjects, meetings: migrateMeetings,
      teams: (x) => x, members: (x) => x,
    };
    const initials = {
      projects: migrateProjects(INITIAL_PROJECTS), meetings: migrateMeetings(INITIAL_MEETINGS),
      teams: INITIAL_TEAMS, members: INITIAL_MEMBERS,
    };
    const refs = {};
    const handlers = {};
    let connectedSubs = 0;
    Object.keys(setters).forEach(key => {
      const ref = fbDb.ref(`${FIREBASE_NS}/${key}`);
      refs[key] = ref;
      handlers[key] = (snap) => {
        const data = snap.val();
        if (data === null) {
          // 원격이 비어있음 → 초기 데이터를 푸시 (최초 셋업)
          ref.set(initials[key]).catch(e => console.error(`Init ${key} 실패:`, e));
        } else {
          fromRemote.current[key] = true;
          setters[key](migrators[key](data));
        }
        if (++connectedSubs >= Object.keys(setters).length) setSyncStatus("connected");
      };
      ref.on("value", handlers[key], (err) => {
        console.error(`Firebase ${key} 구독 오류:`, err);
        setSyncStatus("error");
      });
    });
    // 연결 상태 모니터링
    const connRef = fbDb.ref(".info/connected");
    const connHandler = (snap) => {
      if (snap.val() === true) setSyncStatus("connected");
      else setSyncStatus("offline");
    };
    connRef.on("value", connHandler);
    return () => {
      Object.entries(refs).forEach(([k, r]) => r.off("value", handlers[k]));
      connRef.off("value", connHandler);
    };
  }, []);

  // 로컬 변경 → Firebase 푸시 (최초 마운트 스킵 + echo 방지)
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbDb) return;
    if (isInitialMount.current.projects) { isInitialMount.current.projects = false; return; }
    if (fromRemote.current.projects) { fromRemote.current.projects = false; return; }
    fbDb.ref(`${FIREBASE_NS}/projects`).set(projects).catch(e => console.error("projects sync 실패:", e));
  }, [projects]);
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbDb) return;
    if (isInitialMount.current.meetings) { isInitialMount.current.meetings = false; return; }
    if (fromRemote.current.meetings) { fromRemote.current.meetings = false; return; }
    fbDb.ref(`${FIREBASE_NS}/meetings`).set(meetings).catch(e => console.error("meetings sync 실패:", e));
  }, [meetings]);
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbDb) return;
    if (isInitialMount.current.teams) { isInitialMount.current.teams = false; return; }
    if (fromRemote.current.teams) { fromRemote.current.teams = false; return; }
    fbDb.ref(`${FIREBASE_NS}/teams`).set(teams).catch(e => console.error("teams sync 실패:", e));
  }, [teams]);
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbDb) return;
    if (isInitialMount.current.members) { isInitialMount.current.members = false; return; }
    if (fromRemote.current.members) { fromRemote.current.members = false; return; }
    fbDb.ref(`${FIREBASE_NS}/members`).set(members).catch(e => console.error("members sync 실패:", e));
  }, [members]);

  const showToast = (msg, type = "info") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2400);
  };

  // ====== 프로젝트 CRUD ======
  const upsertProject = (proj) => {
    if (proj.id) {
      setProjects((ps) => ps.map((p) => (p.id === proj.id ? proj : p)));
      showToast("프로젝트가 수정되었습니다", "success");
    } else {
      const id = Math.max(0, ...projects.map((p) => p.id)) + 1;
      // 신규 프로젝트는 기본 마일스톤 15개 자동 세팅 (사용자가 비워둔 경우)
      const milestones = (proj.milestones && proj.milestones.length) ? proj.milestones : buildDefaultMilestones();
      setProjects((ps) => [...ps, { ...proj, id, milestones, attachments: proj.attachments || [] }]);
      showToast(`프로젝트가 추가되었습니다 (기본 마일스톤 ${milestones.length}개 자동 생성)`, "success");
    }
  };
  const deleteProject = (id) => {
    if (!confirm("이 프로젝트와 관련된 회의록도 함께 삭제됩니다. 진행할까요?")) return;
    setProjects((ps) => ps.filter((p) => p.id !== id));
    setMeetings((ms) => ms.filter((m) => m.projectId !== id));
    showToast("삭제되었습니다", "info");
    setDrawerProject(null);
  };

  // ====== 회의록 CRUD ======
  const upsertMeeting = (meet) => {
    if (meet.id) {
      setMeetings((ms) => ms.map((m) => (m.id === meet.id ? meet : m)));
      showToast("회의록이 수정되었습니다", "success");
    } else {
      const id = Math.max(0, ...meetings.map((m) => m.id)) + 1;
      setMeetings((ms) => [...ms, { ...meet, id }]);
      showToast("회의록이 추가되었습니다", "success");
    }
  };
  const deleteMeeting = (id) => {
    if (!confirm("이 회의록을 삭제할까요?")) return;
    setMeetings((ms) => ms.filter((m) => m.id !== id));
    showToast("회의록이 삭제되었습니다", "info");
  };

  // ====== 백업/복원 ======
  const exportJson = () => {
    const blob = new Blob([JSON.stringify({ projects, meetings, teams, members, exportedAt: new Date().toISOString() }, null, 2)],
      { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `bridgeseven_pm_backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("JSON 백업이 다운로드되었습니다", "success");
  };
  const importJson = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (Array.isArray(data.projects)) setProjects(migrateProjects(data.projects));
        if (Array.isArray(data.meetings)) setMeetings(migrateMeetings(data.meetings));
        if (Array.isArray(data.teams)) setTeams(data.teams);
        if (Array.isArray(data.members)) setMembers(data.members);
        showToast("데이터를 불러왔습니다", "success");
      } catch {
        showToast("파일 형식이 올바르지 않습니다", "danger");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };
  const resetData = () => {
    if (!confirm("모든 데이터를 초기 샘플 상태로 되돌립니다. 진행할까요?")) return;
    setProjects(migrateProjects(INITIAL_PROJECTS));
    setMeetings(migrateMeetings(INITIAL_MEETINGS));
    setTeams(INITIAL_TEAMS);
    setMembers(INITIAL_MEMBERS);
    showToast("초기화되었습니다", "info");
  };

  // 팀 CRUD
  const upsertTeam = (t) => {
    if (t.id) {
      setTeams(ts => ts.map(x => x.id === t.id ? t : x));
      showToast("팀이 수정되었습니다", "success");
    } else {
      const id = Math.max(0, ...teams.map(x => x.id)) + 1;
      setTeams(ts => [...ts, { ...t, id, order: ts.length + 1 }]);
      showToast("팀이 추가되었습니다", "success");
    }
  };
  const deleteTeam = (id) => {
    const memberCount = members.filter(m => m.teamId === id).length;
    if (memberCount > 0) {
      alert(`이 팀에 ${memberCount}명의 팀원이 있어 삭제할 수 없습니다. 먼저 팀원을 다른 팀으로 옮기거나 삭제해주세요.`);
      return;
    }
    if (!confirm("이 팀을 삭제할까요?")) return;
    setTeams(ts => ts.filter(t => t.id !== id));
    showToast("팀이 삭제되었습니다", "info");
  };

  // 팀원 CRUD
  const upsertMember = (m) => {
    // 이름 중복 체크
    const dup = members.find(x => x.name === m.name && x.id !== m.id);
    if (dup) {
      alert(`'${m.name}' 이름의 팀원이 이미 있습니다`);
      return;
    }
    if (m.id) {
      setMembers(ms => ms.map(x => x.id === m.id ? m : x));
      showToast("팀원 정보가 수정되었습니다", "success");
    } else {
      const id = Math.max(0, ...members.map(x => x.id)) + 1;
      setMembers(ms => [...ms, { ...m, id }]);
      showToast(`${m.name} 님이 추가되었습니다`, "success");
    }
  };
  const deleteMember = (id) => {
    const m = members.find(x => x.id === id);
    if (!m) return;
    if (!confirm(`'${m.name}' 팀원을 삭제할까요?\n주의: 기존 프로젝트/회의록에 등록된 이름은 그대로 남아있으니 필요시 직접 정리해주세요.`)) return;
    setMembers(ms => ms.filter(x => x.id !== id));
    showToast(`${m.name} 님이 삭제되었습니다`, "info");
  };

  // 마일스톤 CRUD
  const upsertMilestone = (projectId, ms) => {
    setProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const list = p.milestones || [];
      if (ms.id) {
        return { ...p, milestones: list.map(m => m.id === ms.id ? ms : m) };
      } else {
        const id = Math.max(0, ...list.map(m => m.id)) + 1;
        return { ...p, milestones: [...list, { ...ms, id }] };
      }
    }));
  };
  const deleteMilestone = (projectId, msId) => {
    setProjects(ps => ps.map(p => p.id !== projectId ? p
      : { ...p, milestones: (p.milestones || []).filter(m => m.id !== msId) }));
  };
  const updateMilestoneStatus = (projectId, msId, status) => {
    setProjects(ps => ps.map(p => p.id !== projectId ? p
      : { ...p, milestones: (p.milestones || []).map(m => m.id === msId ? { ...m, status } : m) }));
  };
  const reorderMilestones = (projectId, fromIdx, toIdx) => {
    if (fromIdx === toIdx) return;
    setProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const list = [...(p.milestones || [])];
      const [moved] = list.splice(fromIdx, 1);
      list.splice(toIdx, 0, moved);
      return { ...p, milestones: list };
    }));
  };

  // 논의사항 inline update
  const updateDiscussionItem = (meetingId, itemId, patch) => {
    setMeetings(ms => ms.map(m => {
      if (m.id !== meetingId) return m;
      return { ...m, discussionItems: (m.discussionItems || []).map(d => d.id === itemId ? { ...d, ...patch } : d) };
    }));
  };

  // 첨부파일 CRUD
  const addAttachment = (projectId, files) => {
    const fileArr = Array.from(files || []);
    fileArr.forEach(file => {
      if (file.size > MAX_FILE_SIZE) {
        showToast(`${file.name} 파일이 5MB를 초과합니다`, "danger");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        setProjects(ps => ps.map(p => {
          if (p.id !== projectId) return p;
          const list = p.attachments || [];
          const id = Math.max(0, ...list.map(a => a.id)) + 1;
          return {
            ...p,
            attachments: [...list, {
              id, name: file.name, type: file.type, size: file.size,
              dataUrl: reader.result, uploadedAt: new Date().toISOString().slice(0, 10),
            }],
          };
        }));
        showToast(`${file.name} 업로드 완료`, "success");
      };
      reader.onerror = () => showToast("파일 읽기 실패", "danger");
      reader.readAsDataURL(file);
    });
  };
  const deleteAttachment = (projectId, attId) => {
    if (!confirm("이 파일을 삭제할까요?")) return;
    setProjects(ps => ps.map(p => p.id !== projectId ? p
      : { ...p, attachments: (p.attachments || []).filter(a => a.id !== attId) }));
    showToast("파일이 삭제되었습니다", "info");
  };

  // 대표자 PIN 로그인
  const REP_PIN_KEY = "bridgeseven_rep_pin_v1";
  const tryRepLogin = (pin) => {
    if (!pin || pin.length < 4) {
      showToast("PIN은 최소 4자리입니다", "danger");
      return false;
    }
    const stored = localStorage.getItem(REP_PIN_KEY);
    if (!stored) {
      // 최초 설정
      localStorage.setItem(REP_PIN_KEY, pin);
      setIsRepMode(true);
      setShowRepLogin(false);
      showToast(`PIN이 설정되었습니다. 대표자 모드로 진입합니다`, "success");
      return true;
    }
    if (pin === stored) {
      setIsRepMode(true);
      setShowRepLogin(false);
      showToast("대표자 모드로 진입했습니다", "success");
      return true;
    }
    showToast("PIN이 일치하지 않습니다", "danger");
    return false;
  };
  const exitRepMode = () => {
    setIsRepMode(false);
    showToast("일반 모드로 전환되었습니다", "info");
  };

  // ====== 파생 데이터 ======
  const filteredProjects = useMemo(() => {
    return projects.filter((p) => {
      if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (filterPM) {
        // filterPM은 이제 "담당자" 통합 필터: PM/서브PM/UX/Dev 어느 하나라도 매칭
        const all = [p.pm, p.subPm, p.uxui, p.dev].filter(Boolean)
          .flatMap(s => s.split(",").map(x => x.trim()));
        if (!all.includes(filterPM)) return false;
      }
      if (filterStatus && p.status !== filterStatus) return false;
      if (filterType && p.type !== filterType) return false;
      return true;
    });
  }, [projects, search, filterPM, filterStatus, filterType]);

  const navItems = [
    { key: "dashboard", label: "대시보드",   icon: "dashboard" },
    { key: "projects",  label: "프로젝트",    icon: "folder" },
    { key: "kanban",    label: "칸반 보드",   icon: "kanban" },
    { key: "meetings",  label: "회의록",      icon: "calendar" },
    { key: "weekly",    label: "주차별 요약", icon: "chart" },
    { key: "reports",   label: "보고서",      icon: "chart" },
    { key: "teams",     label: "팀 관리",     icon: "user" },
  ];

  return (
    <MembersContext.Provider value={{ members, teams }}>
    <div className="min-h-screen flex flex-col">
      {/* 헤더 - 반응형 */}
      <header className="bg-white border-b border-gray-200 sticky top-0 z-30">
        <div className="px-3 sm:px-4 md:px-6 h-14 flex items-center justify-between gap-2 max-w-[1920px] mx-auto">
          {/* 로고 영역 */}
          <div className="flex items-center gap-2 md:gap-3 min-w-0">
            <div className="w-8 h-8 rounded bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
              B7
            </div>
            <div className="min-w-0 hidden xs:block">
              <div className="text-[14px] md:text-[15px] font-bold text-gray-800 leading-tight truncate">Bridgeseven</div>
              <div className="text-[10px] md:text-[11px] text-gray-500 leading-tight truncate">Project Dashboard</div>
            </div>
            <div className="hidden md:block"><SyncIndicator status={syncStatus} /></div>
          </div>

          {/* 데스크톱 nav (lg 이상) */}
          <nav className="hidden lg:flex items-center gap-1 flex-1 justify-center">
            {navItems.map((n) => (
              <button
                key={n.key}
                onClick={() => setView(n.key)}
                className={`flex items-center gap-2 px-2 xl:px-3 h-9 rounded-md text-xs xl:text-sm font-medium transition ${
                  view === n.key ? "bg-orange-50 text-orange-700" : "text-gray-600 hover:bg-gray-100"
                }`}
              >
                <Icon name={n.icon} size={16} />
                <span className="hidden xl:inline">{n.label}</span>
              </button>
            ))}
          </nav>

          {/* 우측 액션 (lg 이상에서만 보임) */}
          <div className="hidden lg:flex items-center gap-1">
            {isRepMode ? (
              <button onClick={exitRepMode}
                className="flex items-center gap-1.5 px-2 xl:px-3 h-9 bg-purple-600 text-white rounded-md font-medium text-[11px] xl:text-xs hover:bg-purple-700 transition">
                <Icon name="user" size={14} />
                <span className="hidden xl:inline">대표자 모드 (종료)</span>
                <span className="xl:hidden">대표</span>
              </button>
            ) : (
              <button onClick={() => setShowRepLogin(true)}
                className="flex items-center gap-1.5 px-2 xl:px-3 h-9 bg-gray-100 text-gray-700 rounded-md font-medium text-[11px] xl:text-xs hover:bg-purple-50 hover:text-purple-700 transition">
                <Icon name="user" size={14} />
                <span className="hidden xl:inline">대표자 로그인</span>
                <span className="xl:hidden">대표</span>
              </button>
            )}
            <div className="w-px h-6 bg-gray-200 mx-1" />
            <button onClick={exportJson} title="JSON 백업"
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-md">
              <Icon name="download" size={16} />
            </button>
            <button onClick={() => fileInputRef.current?.click()} title="JSON 불러오기"
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-md">
              <Icon name="upload" size={16} />
            </button>
            <input ref={fileInputRef} type="file" accept=".json" hidden onChange={importJson} />
            <button onClick={resetData} title="초기화"
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-md">
              <Icon name="refresh" size={16} />
            </button>
          </div>

          {/* 모바일 동기화 인디케이터 + 햄버거 버튼 (lg 미만에서만 보임) */}
          <div className="flex lg:hidden items-center gap-2">
            <SyncIndicator status={syncStatus} />
            <button onClick={() => setMobileMenuOpen(o => !o)}
              className="p-2 text-gray-700 hover:bg-gray-100 rounded-md"
              aria-label="메뉴 열기">
              <Icon name={mobileMenuOpen ? "close" : "menu"} size={20} />
            </button>
          </div>
        </div>

        {/* 모바일 슬라이드다운 메뉴 */}
        {mobileMenuOpen && (
          <div className="lg:hidden border-t border-gray-200 bg-white shadow-md">
            <nav className="flex flex-col px-3 py-2">
              {navItems.map((n) => (
                <button key={n.key}
                  onClick={() => { setView(n.key); setMobileMenuOpen(false); }}
                  className={`flex items-center gap-3 px-3 h-11 rounded-md text-sm font-medium transition ${
                    view === n.key ? "bg-orange-50 text-orange-700" : "text-gray-700 hover:bg-gray-100"
                  }`}>
                  <Icon name={n.icon} size={18} />
                  {n.label}
                </button>
              ))}
            </nav>
            <div className="border-t border-gray-100 px-3 py-2 flex flex-wrap items-center gap-1.5">
              {isRepMode ? (
                <button onClick={() => { exitRepMode(); setMobileMenuOpen(false); }}
                  className="flex-1 flex items-center justify-center gap-1.5 px-3 h-9 bg-purple-600 text-white rounded-md text-xs font-semibold">
                  <Icon name="user" size={14} /> 대표자 모드 종료
                </button>
              ) : (
                <button onClick={() => { setShowRepLogin(true); setMobileMenuOpen(false); }}
                  className="flex-1 flex items-center justify-center gap-1.5 px-3 h-9 bg-gray-100 text-gray-700 rounded-md text-xs font-semibold">
                  <Icon name="user" size={14} /> 대표자 로그인
                </button>
              )}
              <button onClick={exportJson} className="p-2 text-gray-500 bg-gray-50 hover:bg-gray-100 rounded-md" title="JSON 백업">
                <Icon name="download" size={16} />
              </button>
              <button onClick={() => fileInputRef.current?.click()} className="p-2 text-gray-500 bg-gray-50 hover:bg-gray-100 rounded-md" title="JSON 불러오기">
                <Icon name="upload" size={16} />
              </button>
              <button onClick={resetData} className="p-2 text-gray-500 bg-gray-50 hover:bg-gray-100 rounded-md" title="초기화">
                <Icon name="refresh" size={16} />
              </button>
            </div>
          </div>
        )}
      </header>

      {/* 대표자 모드 알림 띠 */}
      {isRepMode && (
        <div className="bg-purple-600 text-white text-center py-1.5 text-xs font-semibold flex items-center justify-center gap-2">
          <Icon name="user" size={13} />
          대표자 모드 - 검토 대기 항목에 결정과 코멘트를 남길 수 있습니다 (주차별 요약에서 확인)
        </div>
      )}

      {/* 본문 - 1920px 이상에서 max-width 적용 */}
      <main className="flex-1 px-3 sm:px-4 md:px-6 py-4 md:py-6 max-w-[1920px] mx-auto w-full">
        {view === "dashboard" && (
          <DashboardView projects={projects} meetings={meetings}
            dashboardFilter={dashboardFilter} setDashboardFilter={setDashboardFilter}
            onSelectProject={(p) => setDrawerProject(p)}
            onSelectPerson={(name, role) => setPersonDrawer({ name, role })}
            onSelectStatus={(s) => setStatusDetail(s)}
            onOpenOverdue={() => setOverdueModal(true)} />
        )}
        {view === "projects" && (
          <ProjectsView
            projects={filteredProjects}
            allProjects={projects}
            search={search} setSearch={setSearch}
            filterPM={filterPM} setFilterPM={setFilterPM}
            filterStatus={filterStatus} setFilterStatus={setFilterStatus}
            filterType={filterType} setFilterType={setFilterType}
            onAdd={() => { setEditingProject(null); setShowProjectModal(true); }}
            onEdit={(p) => { setEditingProject(p); setShowProjectModal(true); }}
            onDelete={deleteProject}
            onSelect={(p) => setDrawerProject(p)}
            meetings={meetings}
          />
        )}
        {view === "kanban" && (
          <KanbanView projects={projects} setProjects={setProjects}
            onSelect={(p) => setDrawerProject(p)} meetings={meetings} />
        )}
        {view === "meetings" && (
          <MeetingsView projects={projects} meetings={meetings}
            onAdd={(projId) => { setEditingMeeting(null); setDefaultMeetingProject(projId); setShowMeetingModal(true); }}
            onEdit={(m) => { setEditingMeeting(m); setShowMeetingModal(true); }}
            onDelete={deleteMeeting} />
        )}
        {view === "weekly" && (
          <WeeklyView projects={projects} meetings={meetings}
            isRepMode={isRepMode}
            onUpdateDiscussion={updateDiscussionItem}
            onSelectProject={(p) => setDrawerProject(p)} />
        )}
        {view === "teams" && (
          <TeamsView teams={teams} members={members} projects={projects}
            onUpsertTeam={upsertTeam} onDeleteTeam={deleteTeam}
            onUpsertMember={upsertMember} onDeleteMember={deleteMember}
            onSelectPerson={(name) => setPersonDrawer({ name, role: "전체" })} />
        )}
        {view === "reports" && (
          <ReportsView projects={projects} meetings={meetings}
            onSelectProject={(p) => setDrawerProject(p)} />
        )}
      </main>

      {/* 모달 */}
      {showProjectModal && (
        <ProjectModal
          project={editingProject}
          onClose={() => setShowProjectModal(false)}
          onSave={(p) => { upsertProject(p); setShowProjectModal(false); }}
        />
      )}
      {showMeetingModal && (
        <MeetingModal
          meeting={editingMeeting}
          defaultProjectId={defaultMeetingProject}
          projects={projects}
          onClose={() => setShowMeetingModal(false)}
          onSave={(m) => { upsertMeeting(m); setShowMeetingModal(false); }}
        />
      )}
      {liveDrawerProject && (
        <ProjectDrawer
          project={liveDrawerProject}
          meetings={meetings.filter((m) => m.projectId === liveDrawerProject.id)}
          onClose={() => setDrawerProject(null)}
          onEdit={() => { setEditingProject(liveDrawerProject); setShowProjectModal(true); setDrawerProject(null); }}
          onDelete={() => deleteProject(liveDrawerProject.id)}
          onAddMeeting={() => { setEditingMeeting(null); setDefaultMeetingProject(liveDrawerProject.id); setShowMeetingModal(true); }}
          onEditMeeting={(m) => { setEditingMeeting(m); setShowMeetingModal(true); }}
          onDeleteMeeting={deleteMeeting}
          onUpsertMilestone={(ms) => upsertMilestone(liveDrawerProject.id, ms)}
          onDeleteMilestone={(id) => deleteMilestone(liveDrawerProject.id, id)}
          onMilestoneStatus={(id, s) => updateMilestoneStatus(liveDrawerProject.id, id, s)}
          onReorderMilestones={(from, to) => reorderMilestones(liveDrawerProject.id, from, to)}
          onAddAttachment={(files) => addAttachment(liveDrawerProject.id, files)}
          onDeleteAttachment={(attId) => deleteAttachment(liveDrawerProject.id, attId)}
        />
      )}
      {showRepLogin && (
        <RepLoginModal onClose={() => setShowRepLogin(false)} onSubmit={tryRepLogin}
          isFirstTime={!localStorage.getItem(REP_PIN_KEY)} />
      )}
      {overdueModal && (
        <OverdueDetailModal projects={projects} meetings={meetings}
          onClose={() => setOverdueModal(false)}
          onSelectProject={(p) => { setOverdueModal(false); setDrawerProject(p); }} />
      )}
      {personDrawer && (
        <PersonDrawer info={personDrawer} projects={projects} meetings={meetings}
          onClose={() => setPersonDrawer(null)}
          onSelectProject={(p) => { setPersonDrawer(null); setDrawerProject(p); }} />
      )}
      {statusDetail && (
        <StatusDetailModal status={statusDetail} projects={projects.filter(p => p.status === statusDetail)}
          onClose={() => setStatusDetail(null)}
          onSelectProject={(p) => { setStatusDetail(null); setDrawerProject(p); }} />
      )}

      {/* 토스트 */}
      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-4 py-2.5 rounded-lg shadow-xl text-sm flex items-center gap-2">
          <Icon name={toast.type === "success" ? "check" : toast.type === "danger" ? "alert" : "info"} size={16} />
          {toast.msg}
        </div>
      )}
    </div>
    </MembersContext.Provider>
  );
}

// ============== 월별 프로젝트 타임라인 (간트 스타일) ==============
function MonthlyTimelineView({ projects, onSelectProject }) {
  const today = new Date();
  // 기본 가시 범위: 이번 달 -1 ~ +8 (총 10개월)
  const [monthOffset, setMonthOffset] = useState(-1);
  const [monthSpan, setMonthSpan] = useState(10);

  const months = useMemo(() => {
    const arr = [];
    const start = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
    for (let i = 0; i < monthSpan; i++) {
      const d = new Date(start.getFullYear(), start.getMonth() + i, 1);
      arr.push({
        year: d.getFullYear(), month: d.getMonth() + 1,
        label: `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}`,
        startDate: new Date(d.getFullYear(), d.getMonth(), 1),
        endDate:   new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59),
      });
    }
    return arr;
  }, [monthOffset, monthSpan]);

  const rangeStart = months[0].startDate;
  const rangeEnd = months[months.length - 1].endDate;
  const rangeDays = (rangeEnd - rangeStart) / (1000 * 60 * 60 * 24);

  // 가시 범위와 겹치는 프로젝트만
  const visible = useMemo(() => {
    return projects.filter(p => {
      if (!p.startDate && !p.dueDate) return false;
      const s = new Date(p.startDate || p.dueDate);
      const e = new Date(p.dueDate || p.startDate);
      return e >= rangeStart && s <= rangeEnd;
    }).sort((a, b) => (a.startDate || a.dueDate || "").localeCompare(b.startDate || b.dueDate || ""));
  }, [projects, rangeStart.getTime(), rangeEnd.getTime()]);

  const positionPct = (dateStr) => {
    if (!dateStr) return 0;
    const d = new Date(dateStr);
    const days = (d - rangeStart) / (1000 * 60 * 60 * 24);
    return Math.max(0, Math.min(100, (days / rangeDays) * 100));
  };

  const todayLineLeft = positionPct(today.toISOString().slice(0, 10));
  const todayInRange = today >= rangeStart && today <= rangeEnd;

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-gray-900 flex items-center gap-2">
            📅 월별 프로젝트 일정
            <span className="text-xs font-normal text-gray-500">({visible.length}건 / 전체 {projects.length}건)</span>
          </h2>
          <p className="text-xs text-gray-500 mt-1">⭐ 표시는 중요 마일스톤입니다. 막대 클릭 시 상세 보기.</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setMonthOffset(o => o - 3)}
            className="p-1.5 hover:bg-gray-100 rounded-md text-gray-600">
            <Icon name="chevronLeft" size={14} />
          </button>
          <button onClick={() => setMonthOffset(-1)}
            className="px-2 py-1 text-xs text-orange-600 hover:bg-orange-50 rounded font-semibold">오늘</button>
          <button onClick={() => setMonthOffset(o => o + 3)}
            className="p-1.5 hover:bg-gray-100 rounded-md text-gray-600">
            <Icon name="chevronRight" size={14} />
          </button>
          <select value={monthSpan} onChange={e => setMonthSpan(Number(e.target.value))}
            className="px-2 py-1 text-xs bg-gray-50 border border-gray-200 rounded outline-none">
            <option value={6}>6개월</option>
            <option value={10}>10개월</option>
            <option value={12}>12개월</option>
            <option value={18}>18개월</option>
          </select>
        </div>
      </div>

      <div className="overflow-x-auto scrollbar-thin">
        <div style={{ minWidth: Math.max(900, monthSpan * 90) }}>
          {/* 월 헤더 */}
          <div className="flex border-b-2 border-gray-200">
            <div className="w-[180px] flex-shrink-0 px-2 py-2 text-[11px] font-bold text-gray-500 uppercase">프로젝트</div>
            <div className="flex-1 grid relative" style={{ gridTemplateColumns: `repeat(${monthSpan}, 1fr)` }}>
              {months.map((m, i) => (
                <div key={i} className={`px-2 py-2 text-[11px] font-bold text-center border-l ${
                  m.year === today.getFullYear() && m.month === today.getMonth() + 1
                    ? "text-orange-600 bg-orange-50/40 border-orange-200"
                    : "text-gray-600 border-gray-100"
                }`}>
                  {m.label}
                </div>
              ))}
            </div>
          </div>

          {/* 프로젝트 행 */}
          {visible.length === 0 ? (
            <div className="text-sm text-gray-400 text-center py-12">
              이 기간에 해당하는 프로젝트가 없습니다 (시작일 또는 마감일 기준)
            </div>
          ) : (
            <div className="relative">
              {/* 오늘 선 */}
              {todayInRange && (
                <div className="absolute top-0 bottom-0 z-20 pointer-events-none"
                  style={{ left: `calc(180px + (100% - 180px) * ${todayLineLeft / 100})` }}>
                  <div className="w-px h-full bg-red-400" />
                  <div className="absolute -top-px -left-1 w-2 h-2 bg-red-400 rounded-full" />
                </div>
              )}

              {visible.map(p => {
                const meta = statusMeta(p.status);
                const left = positionPct(p.startDate || p.dueDate);
                const right = positionPct(p.dueDate || p.startDate);
                const width = Math.max(2, right - left);
                const importantMs = (p.milestones || []).filter(m => m.important);

                return (
                  <div key={p.id} className="flex border-b border-gray-100 hover:bg-gray-50 group">
                    <button onClick={() => onSelectProject(p)}
                      className="w-[180px] flex-shrink-0 px-2 py-2 text-left text-xs flex items-center gap-1.5 min-w-0 hover:text-orange-700">
                      <span className={`text-[9px] font-bold px-1 py-0.5 rounded flex-shrink-0 ${
                        p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                      }`}>{p.type === "구축PJ" ? "구축" : "운영"}</span>
                      <span className="font-semibold truncate">{p.name}</span>
                    </button>
                    <div className="flex-1 relative py-2" style={{ minHeight: 36 }}>
                      {/* 월 격자 */}
                      <div className="absolute inset-0 grid" style={{ gridTemplateColumns: `repeat(${monthSpan}, 1fr)` }}>
                        {months.map((_, i) => (
                          <div key={i} className="border-l border-gray-100" />
                        ))}
                      </div>
                      {/* 바 */}
                      <button onClick={() => onSelectProject(p)}
                        className="absolute h-5 top-1/2 -translate-y-1/2 rounded-md flex items-center px-2 text-[10px] font-bold text-white truncate hover:opacity-90 transition shadow-sm"
                        style={{
                          left: `${left}%`, width: `${width}%`,
                          backgroundColor: meta.color,
                          minWidth: 4,
                        }}
                        title={`${p.name}\n${p.startDate || "?"} ~ ${p.dueDate || "?"}\n진척도 ${computeProgress(p)}%`}>
                        {width > 8 && <span className="truncate">{computeProgress(p)}%</span>}
                      </button>
                      {/* 중요 마일스톤 마커 */}
                      {importantMs.map(ms => {
                        const ml = positionPct(ms.endDate || ms.startDate);
                        if (ml < 0 || ml > 100) return null;
                        const msMeta = milestoneMeta(ms.status);
                        return (
                          <div key={ms.id}
                            className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 z-10 cursor-help"
                            style={{ left: `${ml}%` }}
                            title={`⭐ ${ms.name} (${ms.endDate || ms.startDate}) · ${ms.status}`}>
                            <div className="text-base leading-none drop-shadow"
                              style={{ filter: ms.status === "완료" ? "grayscale(0.3)" : "none" }}>⭐</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* 범례 */}
      <div className="mt-4 pt-3 border-t border-gray-100 flex items-center gap-4 flex-wrap text-[11px] text-gray-500">
        <span className="flex items-center gap-1"><span className="w-3 h-3 bg-red-400 rounded-full"></span> 오늘</span>
        <span className="flex items-center gap-1">⭐ 중요 마일스톤</span>
        <span className="flex items-center gap-1">막대 색상 = 프로젝트 상태</span>
        <span className="flex items-center gap-1">막대 클릭 → 프로젝트 상세</span>
      </div>
    </div>
  );
}

// ============== 대시보드 뷰 ==============
function DashboardView({ projects, meetings, dashboardFilter, setDashboardFilter,
                        onSelectProject, onSelectPerson, onSelectStatus, onOpenOverdue }) {
  const [roleTab, setRoleTab] = useState("PM");

  const stats = useMemo(() => {
    const total = projects.length;
    const built = projects.filter((p) => p.type === "구축PJ").length;
    const operating = projects.filter((p) => p.type === "운영PJ").length;
    const inProgress = projects.filter((p) => !["완료", "보류", "월 비용 계약"].includes(p.status)).length;
    const uat = projects.filter((p) => p.status === "UAT").length;
    const onHold = projects.filter((p) => p.status === "보류").length;
    const today = new Date().toISOString().slice(0, 10);
    const overdueActions = meetings.filter((m) => m.deadline && m.deadline < today && m.status !== "완료").length;
    const overdueProjects = projects.filter((p) => p.dueDate && p.dueDate < today && !["완료", "보류", "월 비용 계약"].includes(p.status)).length;
    return { total, built, operating, inProgress, uat, onHold, overdueActions, overdueProjects };
  }, [projects, meetings]);

  // 필터된 프로젝트 (대시보드 상단 카드 클릭에 반응)
  const filteredProjects = useMemo(() => {
    if (dashboardFilter === "uat") return projects.filter(p => p.status === "UAT");
    // 기본값 active
    return projects.filter(p => !["완료", "보류", "월 비용 계약"].includes(p.status));
  }, [projects, dashboardFilter]);

  // 상태별 분포
  const statusDist = useMemo(() => {
    const counts = {};
    projects.forEach((p) => { counts[p.status] = (counts[p.status] || 0) + 1; });
    return Object.entries(counts).map(([k, v]) => ({ status: k, count: v }))
      .sort((a, b) => b.count - a.count);
  }, [projects]);

  // 담당자별 부하 (PM / 서브PM / UX/UI / Dev 각각)
  const personLoad = useMemo(() => {
    const calc = (field) => {
      const counts = {};
      projects.forEach((p) => {
        const raw = p[field];
        if (!raw) return;
        // dev는 "박예림, 이세련" 형태로 여러명일 수 있음 → 분리
        raw.split(",").map(s => s.trim()).filter(Boolean).forEach(name => {
          if (name === "없음") return;
          if (!counts[name]) counts[name] = { count: 0, active: 0 };
          counts[name].count += 1;
          if (!["완료", "보류", "월 비용 계약"].includes(p.status)) counts[name].active += 1;
        });
      });
      return Object.entries(counts).map(([k, v]) => ({ name: k, ...v }))
        .sort((a, b) => b.active - a.active || b.count - a.count);
    };
    return { PM: calc("pm"), "서브 PM": calc("subPm"), "UX/UI": calc("uxui"), Dev: calc("dev") };
  }, [projects]);

  // 임박 마감 (7일 이내)
  const upcoming = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return projects.filter((p) => {
      if (!p.dueDate || p.status === "완료" || p.status === "보류") return false;
      const d = daysBetween(today, p.dueDate);
      return d !== null && d >= 0 && d <= 14;
    }).sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  }, [projects]);

  // 최근 회의
  const recent = useMemo(() => {
    return [...meetings].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
  }, [meetings]);

  // 클릭하면 필터 적용되는 카드 (진행중/UAT)
  const filterCards = [
    { key: "active", label: "진행중",        value: stats.inProgress, sub: `보류 ${stats.onHold}`,                          color: "#3B82F6" },
    { key: "uat",    label: "UAT",          value: stats.uat,        sub: "사용자 검수 진행",                               color: "#F59E0B" },
  ];

  return (
    <div className="space-y-6">
      <div>
        <h1 className="text-2xl font-bold text-gray-900">대시보드</h1>
        <p className="text-sm text-gray-500 mt-1">전체 프로젝트 현황을 한눈에 파악하세요</p>
      </div>

      {/* 필터 카드 (클릭하여 아래 프로젝트 리스트 필터링) */}
      <div className="grid grid-cols-1 xs:grid-cols-3 gap-3 md:gap-4">
        {filterCards.map((c) => {
          const active = dashboardFilter === c.key;
          return (
            <button key={c.key} onClick={() => setDashboardFilter(c.key)}
              className={`text-left bg-white rounded-xl border p-5 transition ${
                active ? "border-orange-400 ring-2 ring-orange-100 shadow" : "border-gray-200 hover:border-orange-200"
              }`}>
              <div className="flex items-center justify-between">
                <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{c.label}</div>
                {active && <span className="text-[10px] font-bold text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded">필터됨</span>}
              </div>
              <div className="mt-2 flex items-baseline gap-3">
                <div className="text-3xl font-bold" style={{ color: c.color }}>{c.value}</div>
                <div className="text-xs text-gray-400">{c.sub}</div>
              </div>
              <div className="mt-3 h-1 rounded-full bg-gray-100 overflow-hidden">
                <div className="h-full" style={{ width: `${Math.min(100, (c.value / Math.max(1, stats.total)) * 100)}%`, backgroundColor: c.color }} />
              </div>
            </button>
          );
        })}
        {/* 마감 지연 (클릭 시 상세 모달) */}
        <button onClick={() => onOpenOverdue()}
          className="text-left bg-white rounded-xl border border-gray-200 p-5 hover:border-red-300 hover:shadow-sm transition">
          <div className="flex items-center justify-between">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider">마감 지연</div>
            <span className="text-[10px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded">클릭 → 상세</span>
          </div>
          <div className="mt-2 flex items-baseline gap-3">
            <div className="text-3xl font-bold text-red-500">{stats.overdueProjects + stats.overdueActions}</div>
            <div className="text-xs text-gray-400">프로젝트 {stats.overdueProjects} · 액션 {stats.overdueActions}</div>
          </div>
          <div className="mt-3 h-1 rounded-full bg-gray-100 overflow-hidden">
            <div className="h-full bg-red-500" style={{ width: `${Math.min(100, ((stats.overdueProjects + stats.overdueActions) / Math.max(1, projects.length + meetings.length)) * 100)}%` }} />
          </div>
        </button>
      </div>

      {/* 필터된 프로젝트 카드 리스트 */}
      <div className="bg-white rounded-xl border border-gray-200 p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <h2 className="font-semibold text-gray-900">
              {dashboardFilter === "uat" ? "UAT 진행 프로젝트" : "진행중인 프로젝트"}
            </h2>
            <span className="text-xs text-gray-500">{filteredProjects.length}건</span>
          </div>
        </div>
        {filteredProjects.length === 0 ? (
          <div className="text-sm text-gray-400 py-8 text-center">조건에 맞는 프로젝트가 없습니다</div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-3">
            {filteredProjects.map(p => (
              <button key={p.id} onClick={() => onSelectProject(p)}
                className="text-left p-3 rounded-lg border border-gray-200 hover:border-orange-200 hover:shadow-sm transition">
                <div className="flex items-center justify-between mb-1.5">
                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                    p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                  }`}>{p.type}</span>
                  <PriorityBadge priority={p.priority} />
                </div>
                <div className="font-semibold text-sm text-gray-900 mb-1.5 truncate">{p.name}</div>
                <StatusBadge status={p.status} />
                <div className="mt-2 h-1 bg-gray-100 rounded overflow-hidden">
                  <div className="h-full" style={{ width: `${computeProgress(p)}%`, backgroundColor: statusMeta(p.status).color }} />
                </div>
                <div className="flex items-center justify-between mt-2 text-[11px] text-gray-500">
                  <div className="flex -space-x-1">
                    {[p.pm, p.uxui, p.dev].filter(x => x && x !== "없음").slice(0,3).map((n,i) => (
                      <Avatar key={i} name={n.split(",")[0].trim()} size={18} />
                    ))}
                  </div>
                  <span>{p.dueDate || "-"}</span>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* 월별 프로젝트 타임라인 */}
      <MonthlyTimelineView projects={projects} onSelectProject={onSelectProject} />

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-4">
        {/* 상태별 분포 (클릭 시 모달) */}
        <div className="bg-white rounded-xl border border-gray-200 p-5 lg:col-span-2">
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-semibold text-gray-900">상태별 프로젝트 분포</h2>
            <span className="text-xs text-gray-500">막대 클릭 시 상세 보기 · 총 {stats.total}건</span>
          </div>
          <div className="space-y-2.5">
            {statusDist.map((s) => {
              const meta = statusMeta(s.status);
              const pct = (s.count / stats.total) * 100;
              return (
                <button key={s.status} onClick={() => onSelectStatus(s.status)}
                  className="w-full flex items-center gap-3 hover:bg-gray-50 rounded-md p-1 -m-1 transition">
                  <div className="w-28 flex-shrink-0">
                    <StatusBadge status={s.status} />
                  </div>
                  <div className="flex-1 h-7 bg-gray-50 rounded-md overflow-hidden relative">
                    <div className="absolute inset-y-0 left-0 rounded-md transition-all"
                      style={{ width: `${pct}%`, backgroundColor: meta.color, opacity: 0.85 }} />
                    <div className="absolute inset-0 flex items-center justify-end pr-3">
                      <span className="text-xs font-bold text-gray-800">{s.count}건 · {pct.toFixed(0)}%</span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* 담당자별 부하 - PM/UX/UI/Dev 탭 */}
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-semibold text-gray-900">담당자별 부하</h2>
          </div>
          <div className="flex gap-1 mb-3 bg-gray-100 p-1 rounded-md">
            {["PM", "서브 PM", "UX/UI", "Dev"].map(t => (
              <button key={t} onClick={() => setRoleTab(t)}
                className={`flex-1 px-2 py-1.5 rounded text-xs font-semibold transition ${
                  roleTab === t ? "bg-white text-gray-900 shadow-sm" : "text-gray-500 hover:text-gray-700"
                }`}>{t}</button>
            ))}
          </div>
          <div className="space-y-2.5">
            {(personLoad[roleTab] || []).length === 0 ? (

function KanbanView({ projects, setProjects, onSelect, meetings }) {
  const [draggedId, setDraggedId] = useState(null);
  const columns = STATUS_LIST.map((s) => s.key);

  const onDragStart = (e, id) => {
    setDraggedId(id);
    e.dataTransfer.effectAllowed = "move";
  };
  const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
  const onDrop = (e, status) => {
    e.preventDefault();
    if (draggedId == null) return;
    setProjects((ps) => ps.map((p) => p.id === draggedId ? { ...p, status } : p));
    setDraggedId(null);
  };

  return (
    <div className="space-y-5">
      <div>
        <h1 className="text-2xl font-bold text-gray-900">칸반 보드</h1>
        <p className="text-sm text-gray-500 mt-1">카드를 드래그해서 상태를 변경하세요</p>
      </div>
      <div className="overflow-x-auto pb-3 scrollbar-thin -mx-6 px-6">
        <div className="flex gap-4" style={{ minWidth: "max-content" }}>
          {columns.map((col) => {
            const items = projects.filter((p) => p.status === col);
            const meta = statusMeta(col);
            return (
              <div key={col}
                onDragOver={onDragOver}
                onDrop={(e) => onDrop(e, col)}
                className="w-[280px] flex-shrink-0 bg-gray-100 rounded-xl p-3"
                style={{ minHeight: "300px" }}>
                <div className="flex items-center justify-between mb-3 px-1">
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: meta.color }} />
                    <span className="text-xs font-bold text-gray-700 uppercase tracking-wide">{col}</span>
                  </div>
                  <span className="text-xs font-semibold text-gray-500 bg-white px-2 py-0.5 rounded-full">{items.length}</span>
                </div>
                <div className="space-y-2">
                  {items.map((p) => {
                    const meetCount = meetings.filter((m) => m.projectId === p.id).length;
                    return (
                      <div key={p.id}
                        draggable
                        onDragStart={(e) => onDragStart(e, p.id)}
                        onClick={() => onSelect(p)}
                        className="kanban-card bg-white rounded-lg p-3 cursor-pointer border border-gray-200">
                        <div className="flex items-center justify-between mb-2">
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                            p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                          }`}>{p.type}</span>
                          <PriorityBadge priority={p.priority} />
                        </div>
                        <div className="font-semibold text-sm text-gray-900 mb-2 leading-tight">{p.name}</div>
                        <div className="h-1 bg-gray-100 rounded-full mb-2 overflow-hidden">
                          <div className="h-full" style={{ width: `${computeProgress(p)}%`, backgroundColor: meta.color }} />
                        </div>
                        <div className="flex items-center justify-between">
                          <div className="flex -space-x-1.5">
                            {[p.pm, p.uxui, p.dev].filter(Boolean).slice(0, 3).map((n, i) => (
                              <Avatar key={i} name={n.split(",")[0].trim()} size={20} />
                            ))}
                          </div>
                          <div className="flex items-center gap-2 text-[10px] text-gray-500">
                            {p.dueDate && <span>{p.dueDate.slice(5)}</span>}
                            {meetCount > 0 && <span>회의 {meetCount}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {items.length === 0 && (
                    <div className="text-xs text-gray-400 text-center py-6 border-2 border-dashed border-gray-200 rounded-lg">
                      여기로 드래그

                  )}

              </div>
            );
          })}

      </div>
    </div>
  );
}

// ============== 주차별 요약 ==============
function WeeklyView({ projects, meetings, isRepMode, onUpdateDiscussion, onSelectProject }) {
  const today = new Date().toISOString().slice(0, 10);
  const [selectedMon, setSelectedMon] = useState(getMonday(today));

  const weekly = useMemo(() => {
    const m = meetings.filter((m) => getMonday(m.date) === selectedMon);
    const byProject = {};
    m.forEach((meet) => {
      if (!byProject[meet.projectId]) byProject[meet.projectId] = [];
      byProject[meet.projectId].push(meet);
    });
    // 모든 논의사항 평탄화 (meetingId, projectId 메타 부착)
    const discussions = [];
    m.forEach((meet) => {
      (meet.discussionItems || []).forEach(d => {
        discussions.push({ ...d, meetingId: meet.id, projectId: meet.projectId, meetingDate: meet.date });
      });
    });
    return { all: m, byProject, discussions };
  }, [meetings, selectedMon]);

  const stats = useMemo(() => {
    const all = weekly.all;
    return {
      total: all.length,
      done: all.filter((m) => m.status === "완료").length,
      pending: all.filter((m) => ["진행중", "예정"].includes(m.status)).length,
      delayed: all.filter((m) => ["지연", "보류"].includes(m.status)).length,
    };
  }, [weekly]);

  const moveWeek = (delta) => {
    const d = new Date(selectedMon);
    d.setDate(d.getDate() + delta * 7);
    setSelectedMon(d.toISOString().slice(0, 10));
  };

  return (
    <div className="space-y-5">
      <div>
        <h1 className="text-2xl font-bold text-gray-900">주차별 요약 보고서</h1>
        <p className="text-sm text-gray-500 mt-1">한 주의 회의 활동을 보고서 형태로 확인하세요</p>
      </div>

      {/* 주차 선택 */}
      <div className="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3 flex-wrap">
        <button onClick={() => moveWeek(-1)} className="p-2 hover:bg-gray-100 rounded-md">
          <Icon name="chevronLeft" size={16} />
        </button>
        <input type="date" value={selectedMon}
          onChange={(e) => setSelectedMon(getMonday(e.target.value))}
          className="px-3 h-9 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none" />
        <button onClick={() => moveWeek(1)} className="p-2 hover:bg-gray-100 rounded-md">
          <Icon name="chevronRight" size={16} />
        </button>
        <span className="font-bold text-gray-800">{formatWeekLabel(selectedMon)}</span>
        <button onClick={() => setSelectedMon(getMonday(today))}
          className="ml-auto text-xs text-orange-600 hover:text-orange-700 font-semibold px-2">
          이번 주로
        </button>
      </div>

      {/* 통계 */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 md:gap-3">
        <StatBlock label="총 회의" value={stats.total} color="#FF8800" icon="calendar" />
        <StatBlock label="완료" value={stats.done} color="#10B981" icon="check" />
        <StatBlock label="진행중/예정" value={stats.pending} color="#3B82F6" icon="clock" />
        <StatBlock label="지연/보류" value={stats.delayed} color="#EF4444" icon="alert" />
      </div>

      {/* 대표 검토 대기 (대표 검토 필요 상태인 항목 별도 표시) */}
      {weekly.discussions.filter(d => d.status === "대표 검토 필요").length > 0 && (
        <div className={`bg-white rounded-xl border-2 p-5 ${isRepMode ? "border-purple-500" : "border-purple-300"}`}>
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="font-bold text-gray-900 flex items-center gap-2">
                👔 대표 검토 대기
                {isRepMode && <span className="text-[11px] bg-purple-600 text-white px-2 py-0.5 rounded-full font-bold">대표자 모드 활성</span>}
              </h2>
              <p className="text-xs text-gray-500 mt-1">
                {isRepMode
                  ? "결정과 코멘트를 직접 입력해주세요"
                  : "대표자 모드로 로그인하시면 결정과 코멘트를 남길 수 있습니다"}
              </p>
            </div>
          </div>
          <div className="space-y-2.5">
            {weekly.discussions.filter(d => d.status === "대표 검토 필요").map((d) => {
              const proj = projects.find(p => p.id === d.projectId);
              const dec = repDecisionMeta(d.repDecision || "대기");
              return (
                <div key={`rep-${d.meetingId}-${d.id}`}
                  className="bg-purple-50/40 border border-purple-200 rounded-lg p-3">
                  <div className="flex items-center justify-between gap-2 mb-2 flex-wrap">
                    <div className="flex items-center gap-2">
                      <button onClick={() => proj && onSelectProject(proj)}
                        className="text-xs font-bold text-orange-700 bg-orange-50 px-2 py-0.5 rounded hover:bg-orange-100">
                        {proj?.name || "(삭제)"}
                      </button>
                      <span className="text-[11px] text-gray-500">{d.meetingDate}</span>
                    </div>
                    <span className="text-[11px] font-bold px-2 py-0.5 rounded"
                      style={{ color: dec.color, backgroundColor: dec.bg }}>
                      결정: {d.repDecision || "대기"}
                    </span>
                  </div>
                  <div className="text-sm font-semibold text-gray-900 mb-1">📌 {d.topic || "(주제 미입력)"}</div>
                  {d.direction && (
                    <div className="text-xs text-gray-600 mb-2">
                      <span className="font-semibold">담당자 진행 방향:</span> {d.direction}
                    </div>
                  )}
                  {/* 대표 결정/코멘트 영역 */}
                  <div className="bg-white rounded-md border border-purple-200 p-2.5 mt-2">
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-[11px] font-bold text-purple-700">👔 대표 검토 결과</div>
                      {isRepMode && (
                        <div className="flex gap-1">
                          {REP_DECISIONS.filter(r => r.key !== "대기").map(r => (
                            <button key={r.key}
                              onClick={() => onUpdateDiscussion(d.meetingId, d.id, {
                                repDecision: r.key,
                                repCommentAt: new Date().toISOString().slice(0, 10),
                              })}
                              className={`text-[11px] px-2 py-0.5 rounded font-semibold transition ${
                                d.repDecision === r.key ? "ring-2" : "opacity-60 hover:opacity-100"
                              }`}
                              style={{ color: r.color, backgroundColor: r.bg }}>
                              {r.key}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                    {isRepMode ? (
                      <textarea value={d.repComment || ""}
                        onChange={e => onUpdateDiscussion(d.meetingId, d.id, {
                          repComment: e.target.value,
                          repCommentAt: new Date().toISOString().slice(0, 10),
                        })}
                        placeholder="대표 코멘트를 입력하세요 (예: 어떻게 진행할지)"
                        rows="2"
                        className="w-full px-2.5 py-1.5 border border-gray-200 rounded text-sm outline-none focus:border-purple-400" />
                    ) : (
                      <div className="text-sm text-gray-700 whitespace-pre-wrap min-h-[40px]">
                        {d.repComment || <span className="text-gray-400 italic">아직 코멘트가 없습니다</span>}
                      </div>
                    )}
                    {d.repCommentAt && (
                      <div className="text-[10px] text-gray-400 mt-1 text-right">최종 업데이트: {d.repCommentAt}</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 주간 논의 사항 집계 */}
      <div className="bg-white rounded-xl border border-purple-200 p-5">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="font-bold text-gray-900 flex items-center gap-2">
              💬 이번 주 논의 사항
              <span className="text-xs font-normal text-gray-500">(주간 회의에서 함께 논의)</span>
            </h2>
            <p className="text-xs text-gray-500 mt-1">상태를 "대표 검토 필요"로 바꾸면 위쪽 별도 섹션으로 이동합니다</p>
          </div>
          <span className="text-xs font-bold text-purple-700 bg-purple-50 px-2 py-1 rounded-full">
            {weekly.discussions.length}건
          </span>
        </div>
        {weekly.discussions.length === 0 ? (
          <div className="text-sm text-gray-400 text-center py-6 border-2 border-dashed border-gray-200 rounded-lg">
            이번 주에 등록된 논의사항이 없습니다
          </div>
        ) : (
          <div className="space-y-2.5">
            {weekly.discussions.map((d) => {
              const proj = projects.find(p => p.id === d.projectId);
              const meta = discussionMeta(d.status);
              return (
                <div key={`${d.meetingId}-${d.id}`}
                  className="border border-gray-200 rounded-lg p-3 hover:border-purple-300 transition">
                  <div className="flex items-start justify-between gap-2 mb-2 flex-wrap">
                    <div className="flex items-center gap-2 flex-wrap">
                      <button onClick={() => proj && onSelectProject(proj)}
                        className="text-xs font-bold text-orange-700 bg-orange-50 px-2 py-0.5 rounded hover:bg-orange-100">
                        {proj?.name || "(삭제)"}
                      </button>
                      <span className="text-[11px] text-gray-500">{d.meetingDate}</span>
                    </div>
                    <select value={d.status}
                      onChange={e => onUpdateDiscussion(d.meetingId, d.id, { status: e.target.value })}
                      className="text-[11px] font-semibold px-2 py-0.5 rounded border border-gray-300 bg-white outline-none cursor-pointer"
                      style={{ color: meta.color, backgroundColor: meta.bg, borderColor: meta.color }}>
                      {DISCUSSION_STATUSES.map(s => <option key={s.key} value={s.key}>{s.key}</option>)}
                    </select>
                  </div>
                  <div className="text-sm font-semibold text-gray-900 mb-2">📌 {d.topic || "(주제 미입력)"}</div>
                  <div>
                    <div className="text-[11px] font-bold text-gray-500 mb-1">진행 방향 / 결론</div>
                    <textarea value={d.direction || ""}
                      onChange={e => onUpdateDiscussion(d.meetingId, d.id, { direction: e.target.value })}
                      placeholder="회의 후 진행 방향을 정리해주세요" rows="2"
                      className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none focus:border-purple-400 focus:bg-white" />
                  </div>
                  {d.status === "대표 검토 필요" && d.repComment && (
                    <div className="mt-2 bg-purple-50 border border-purple-200 rounded p-2 text-xs">
                      <strong className="text-purple-700">👔 대표 코멘트 ({d.repDecision || "대기"}):</strong> {d.repComment}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* 프로젝트별 그룹 */}
      <div className="space-y-4">
        {Object.keys(weekly.byProject).length === 0 ? (
          <div className="bg-white rounded-xl border border-gray-200 p-12 text-center text-gray-400 text-sm">
            이 주차에 회의록이 없습니다
          </div>
        ) : (
          Object.entries(weekly.byProject).map(([pid, mList]) => {
            const proj = projects.find((p) => p.id === Number(pid));
            return (
              <div key={pid} className="bg-white rounded-xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-3 bg-gray-50 border-b border-gray-200 flex items-center gap-3">
                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                    proj?.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                  }`}>{proj?.type}</span>
                  <h3 className="font-bold text-gray-900">{proj?.name || "(삭제된 프로젝트)"}</h3>
                  {proj && <StatusBadge status={proj.status} />}
                  <span className="ml-auto text-xs text-gray-500 font-semibold">{mList.length}건</span>
                </div>
                <div className="divide-y divide-gray-100">
                  {mList.map((m) => (
                    <div key={m.id} className="px-5 py-3 hover:bg-gray-50 transition">
                      <div className="flex items-start justify-between gap-3 mb-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-bold text-gray-500">{m.date}</span>
                          <ActionStatusBadge status={m.status} />
                        </div>
                      </div>
                      <div className="font-medium text-sm text-gray-800 mb-1">{m.agenda}</div>
                      {m.decisions && <div className="text-xs text-gray-600 mt-1">📌 {m.decisions}</div>}
                      {m.actions && (
                        <div className="text-xs text-gray-600 mt-1">
                          ⚡ {m.actions}
                          {m.owner && <span className="ml-2 text-gray-400">→ {m.owner}{m.deadline && ` (~${m.deadline})`}</span>}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

const StatBlock = ({ label, value, color, icon }) => (
  <div className="bg-white rounded-xl border border-gray-200 p-4">
    <div className="flex items-center justify-between mb-2">
      <span className="text-xs font-semibold text-gray-500">{label}</span>
      <Icon name={icon} size={16} className="text-gray-400" />
    </div>
    <div className="text-2xl font-bold" style={{ color }}>{value}</div>
  </div>
);

// ============== 모달: 프로젝트 ==============
function ProjectModal({ project, onClose, onSave }) {
  const { members, teams } = useContext(MembersContext);
  const planningTeamId = (teams.find(t => t.name.includes("기획")) || {}).id;
  const planners = members.filter(m => !planningTeamId || m.teamId === planningTeamId);
  const [form, setForm] = useState(project || {
    type: "구축PJ", name: "", status: "예정", pm: "", subPm: "", uxui: "", dev: "",
    progress: 0, startDate: "", dueDate: "", priority: "중", note: "",
    milestones: [], attachments: [],
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  return (
    <Modal title={project ? "프로젝트 수정" : "새 프로젝트"} onClose={onClose} size="lg">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <Field label="프로젝트명 *">
          <input type="text" value={form.name} onChange={(e) => set("name", e.target.value)}
            className="form-input" placeholder="예: 새 프로젝트" />
        </Field>
        <Field label="구분">
          <select value={form.type} onChange={(e) => set("type", e.target.value)} className="form-input">
            <option value="구축PJ">구축PJ</option>
            <option value="운영PJ">운영PJ</option>
          </select>
        </Field>
        <Field label="상태">
          <select value={form.status} onChange={(e) => set("status", e.target.value)} className="form-input">
            {STATUS_LIST.map((s) => <option key={s.key} value={s.key}>{s.key}</option>)}
          </select>
        </Field>
        <Field label="우선순위">
          <select value={form.priority} onChange={(e) => set("priority", e.target.value)} className="form-input">
            <option value="상">상</option><option value="중">중</option><option value="하">하</option>
          </select>
        </Field>
        <Field label="PM">
          <select value={form.pm} onChange={(e) => set("pm", e.target.value)} className="form-input">
            <option value="">선택</option>
            {planners.map((m) => <option key={m.id}>{m.name}</option>)}
          </select>
        </Field>
        <Field label="서브 PM">
          <select value={form.subPm} onChange={(e) => set("subPm", e.target.value)} className="form-input">
            <option value="">선택 (선택사항)</option>
            {planners.filter(m => m.name !== form.pm).map((m) => <option key={m.id}>{m.name}</option>)}
          </select>
        </Field>
        <Field label="UX/UI 담당">
          <select value={form.uxui} onChange={(e) => set("uxui", e.target.value)} className="form-input">
            <option value="">선택</option>
            {members.map((m) => <option key={m.id}>{m.name}</option>)}
          </select>
        </Field>
        <Field label="Dev 담당">
          <input type="text" value={form.dev} onChange={(e) => set("dev", e.target.value)}
            className="form-input" placeholder="예: 박예림 또는 박예림, 이세련" />
        </Field>
        <Field label="시작일">
          <input type="date" value={form.startDate} onChange={(e) => set("startDate", e.target.value)} className="form-input" />
        </Field>
        <Field label="마감일">
          <input type="date" value={form.dueDate} onChange={(e) => set("dueDate", e.target.value)} className="form-input" />
        </Field>
        <Field label="진척도">
          <div className="px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-sm text-gray-600">
            <strong className="text-gray-900">{computeProgress(form)}%</strong>
            <span className="ml-2 text-xs text-gray-500">
              {(form.milestones || []).length === 0
                ? "(마일스톤을 추가하면 자동 계산됩니다)"
                : `(완료 ${(form.milestones || []).filter(m => m.status === "완료").length} / 총 ${(form.milestones || []).length}개)`}
            </span>
          </div>
        </Field>
        <Field label="비고" colSpan="2">
          <textarea value={form.note} onChange={(e) => set("note", e.target.value)}
            className="form-input" rows="2" />
        </Field>
      </div>
      <ModalFooter
        onCancel={onClose}
        onSubmit={() => { if (!form.name) return alert("프로젝트명을 입력하세요"); onSave(form); }}
      />
    </Modal>
  );
}

// ============== 모달: 회의록 ==============
function MeetingModal({ meeting, defaultProjectId, projects, onClose, onSave }) {
  const { members } = useContext(MembersContext);
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState(() => {
    const base = meeting || {
      projectId: defaultProjectId || projects[0]?.id || 1,
      date: today, agenda: "", attendees: "",
      decisions: "", actions: "", owner: "", deadline: "", status: "예정",
      discussionItems: [],
    };
    return { ...base, discussionItems: base.discussionItems || [] };
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const addDiscussion = () => {
    const id = Math.max(0, ...form.discussionItems.map(d => d.id)) + 1;
    set("discussionItems", [...form.discussionItems, { id, topic: "", direction: "", status: "미해결" }]);
  };
  const updateDiscussion = (id, patch) =>
    set("discussionItems", form.discussionItems.map(d => d.id === id ? { ...d, ...patch } : d));
  const removeDiscussion = (id) =>
    set("discussionItems", form.discussionItems.filter(d => d.id !== id));

  return (
    <Modal title={meeting ? "회의록 수정" : "새 회의록"} onClose={onClose} size="lg">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <Field label="프로젝트 *">
          <select value={form.projectId} onChange={(e) => set("projectId", Number(e.target.value))} className="form-input">
            {projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </Field>
        <Field label="회의일 *">
          <input type="date" value={form.date} onChange={(e) => set("date", e.target.value)} className="form-input" />
        </Field>
        <Field label="안건 *" colSpan="2">
          <input type="text" value={form.agenda} onChange={(e) => set("agenda", e.target.value)}
            className="form-input" placeholder="예: 디자인 시안 피드백" />
        </Field>
        <Field label="참석자" colSpan="2">
          <input type="text" value={form.attendees} onChange={(e) => set("attendees", e.target.value)}
            className="form-input" placeholder="예: 임기섭, 김미리, 고객사" />
        </Field>
        <Field label="결정사항" colSpan="2">
          <textarea value={form.decisions} onChange={(e) => set("decisions", e.target.value)}
            className="form-input" rows="2" placeholder="회의에서 결정된 내용" />
        </Field>
        <Field label="액션 아이템" colSpan="2">
          <textarea value={form.actions} onChange={(e) => set("actions", e.target.value)}
            className="form-input" rows="2" placeholder="후속 조치 내용" />
        </Field>
        <Field label="액션 담당자">
          <select value={form.owner} onChange={(e) => set("owner", e.target.value)} className="form-input">
            <option value="">선택</option>
            {members.map((m) => <option key={m.id}>{m.name}</option>)}
          </select>
        </Field>
        <Field label="마감일">
          <input type="date" value={form.deadline} onChange={(e) => set("deadline", e.target.value)} className="form-input" />
        </Field>
        <Field label="상태" colSpan="2">
          <div className="flex gap-2 flex-wrap">
            {ACTION_STATUSES.map((s) => (
              <button key={s} type="button" onClick={() => set("status", s)}
                className={`px-3 py-1.5 rounded-md text-sm font-semibold transition ${
                  form.status === s ? "bg-orange-500 text-white" : "bg-gray-100 text-gray-700 hover:bg-gray-200"
                }`}>{s}</button>
            ))}
          </div>
        </Field>
      </div>

      {/* 주간 회의 논의 사항 */}
      <div className="mt-5 pt-5 border-t border-gray-200">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h3 className="font-bold text-gray-900 text-sm">💬 주간 회의 논의 사항</h3>
            <p className="text-[11px] text-gray-500 mt-0.5">주차별 요약에서 모든 프로젝트의 논의사항이 한 곳에 모입니다</p>
          </div>
          <button type="button" onClick={addDiscussion}
            className="flex items-center gap-1 px-3 h-8 bg-purple-500 hover:bg-purple-600 text-white rounded text-xs font-medium transition">
            <Icon name="plus" size={13} /> 논의사항 추가
          </button>
        </div>
        {form.discussionItems.length === 0 ? (
          <div className="text-xs text-gray-400 text-center py-4 border-2 border-dashed border-gray-200 rounded-lg">
            추가할 논의사항이 없으면 비워두셔도 됩니다
          </div>
        ) : (
          <div className="space-y-2">
            {form.discussionItems.map((d, idx) => (
              <div key={d.id} className="bg-purple-50/50 border border-purple-200 rounded-lg p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-[11px] font-bold text-purple-700">논의사항 #{idx + 1}</span>
                  <div className="flex items-center gap-2">
                    <select value={d.status} onChange={e => updateDiscussion(d.id, { status: e.target.value })}
                      className="text-[11px] px-2 py-0.5 rounded border border-gray-300 bg-white outline-none">
                      {DISCUSSION_STATUSES.map(s => <option key={s.key} value={s.key}>{s.key}</option>)}
                    </select>
                    <button type="button" onClick={() => removeDiscussion(d.id)}
                      className="text-gray-400 hover:text-red-600">
                      <Icon name="trash" size={12} />
                    </button>
                  </div>
                </div>
                <input type="text" value={d.topic} onChange={e => updateDiscussion(d.id, { topic: e.target.value })}
                  placeholder="논의 주제 (예: 트래픽 대응 방안)"
                  className="form-input mb-1.5 text-sm" />
                <textarea value={d.direction} onChange={e => updateDiscussion(d.id, { direction: e.target.value })}
                  placeholder="진행 방향 / 결론 (회의 후 채워주세요)" rows="2"
                  className="form-input text-sm" />
              </div>
            ))}
          </div>
        )}
      </div>
      <ModalFooter
        onCancel={onClose}
        onSubmit={() => {
          if (!form.agenda) return alert("안건을 입력하세요");
          if (!form.date) return alert("회의일을 입력하세요");
          onSave(form);
        }}
      />
    </Modal>
  );
}

// ============== 프로젝트 상세 드로어 ==============
function ProjectDrawer({ project, meetings, onClose, onEdit, onDelete, onAddMeeting, onEditMeeting, onDeleteMeeting,
                         onUpsertMilestone, onDeleteMilestone, onMilestoneStatus, onReorderMilestones,
                         onAddAttachment, onDeleteAttachment }) {

          </div>

          {/* 마일스톤 섹션 */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h3 className="font-bold text-gray-900">마일스톤 ({(project.milestones || []).length})</h3>
                <p className="text-[11px] text-gray-500 mt-0.5">⋮⋮ 그립을 잡고 드래그해서 순서를 바꿀 수 있습니다</p>

              <button onClick={() => setEditingMS({})}

                <Icon name="plus" size={13} /> 마일스톤 추가

            {(project.milestones || []).length === 0 ? (

                {(project.milestones || []).map((ms, idx) => {

          <div>
