// ============== 보고서 뷰 ==============
function ReportsView({ projects, meetings, onSelectProject }) {
  const today = new Date();
  const currentYear = today.getFullYear();
  const [mode, setMode] = useState("year"); // year | custom
  const [selectedYear, setSelectedYear] = useState(currentYear);
  const [startDate, setStartDate] = useState(`${currentYear}-01-01`);
  const [endDate, setEndDate] = useState(`${currentYear}-12-31`);

  // 가용 연도 자동 추출
  const availableYears = useMemo(() => {
    const years = new Set([currentYear, currentYear - 1]);
    projects.forEach(p => {
      if (p.startDate) years.add(new Date(p.startDate).getFullYear());
      if (p.dueDate) years.add(new Date(p.dueDate).getFullYear());
    });
    meetings.forEach(m => {
      if (m.date) years.add(new Date(m.date).getFullYear());
    });
    return [...years].sort((a, b) => b - a);
  }, [projects, meetings]);

  const range = useMemo(() => {
    if (mode === "year") {
      return { start: `${selectedYear}-01-01`, end: `${selectedYear}-12-31`, label: `${selectedYear}년` };
    }
    return { start: startDate, end: endDate, label: `${startDate} ~ ${endDate}` };
  }, [mode, selectedYear, startDate, endDate]);

  const inRange = (d) => d && d >= range.start && d <= range.end;

  // 통계 계산
  const stats = useMemo(() => {
    // 기간 내 활성 프로젝트 (날짜 범위 겹침)
    const periodProjects = projects.filter(p => {
      const s = p.startDate, e = p.dueDate;
      if (s && inRange(s)) return true;
      if (e && inRange(e)) return true;
      if (s && e && s <= range.end && e >= range.start) return true;
      return false;
    });
    // 신규 프로젝트 (기간 내 시작)
    const newProjects = projects.filter(p => p.startDate && inRange(p.startDate));
    // 완료 프로젝트
    const completedProjects = projects.filter(p =>
      p.status === "완료" && p.dueDate && inRange(p.dueDate));
    // 모든 마일스톤 평탄화
    const allMs = [];
    projects.forEach(p => (p.milestones || []).forEach(m =>
      allMs.push({ ...m, projectId: p.id, projectName: p.name, projectType: p.type })));
    // 기간 내 완료 마일스톤
    const completedMs = allMs.filter(m =>
      m.status === "완료" && m.endDate && inRange(m.endDate));
    // 기간 내 활성/시작된 마일스톤
    const activeMs = allMs.filter(m =>
      (m.startDate && inRange(m.startDate)) || (m.endDate && inRange(m.endDate)));
    // 기본 마일스톤 15개별 통계
    const defaultMsStats = DEFAULT_NEW_PROJECT_MILESTONES.map(name => {
      const matching = allMs.filter(m => m.name === name);
      const completedInRange = matching.filter(m => m.status === "완료" && m.endDate && inRange(m.endDate));
      const inProgressInRange = matching.filter(m => m.status === "진행중" &&
        ((m.startDate && inRange(m.startDate)) || (m.endDate && inRange(m.endDate))));
      return {
        name, total: matching.length,
        completed: completedInRange.length,
        inProgress: inProgressInRange.length,
        completionRate: matching.length === 0 ? 0 : Math.round((completedInRange.length / matching.length) * 100),
      };
    });
    // 기간 내 회의 + 논의사항
    const periodMeetings = meetings.filter(m => m.date && inRange(m.date));
    const allDiscussions = [];
    periodMeetings.forEach(meet => {
      (meet.discussionItems || []).forEach(d =>
        allDiscussions.push({ ...d, meetingDate: meet.date, projectId: meet.projectId }));
    });
    // 논의사항 상태별 카운트
    const discussionByStatus = {};
    DISCUSSION_STATUSES.forEach(s => discussionByStatus[s.key] = 0);
    allDiscussions.forEach(d => {
      if (discussionByStatus[d.status] !== undefined) discussionByStatus[d.status]++;
    });
    // 처리된 논의사항 = 해결
    const resolvedDiscussions = allDiscussions.filter(d => d.status === "해결");
    // 대표 검토 항목
    const repItems = allDiscussions.filter(d => d.status === "대표 검토 필요");
    const repByDecision = {};
    REP_DECISIONS.forEach(r => repByDecision[r.key] = 0);
    repItems.forEach(d => {
      const dec = d.repDecision || "대기";
      if (repByDecision[dec] !== undefined) repByDecision[dec]++;
    });
    const repProcessed = repItems.filter(d => d.repDecision && d.repDecision !== "대기");
    // 월별 분포 (선택 연도일 때만 의미 있음)
    const monthly = Array.from({ length: 12 }, (_, i) => {
      const m = i + 1;
      const monthStart = `${selectedYear}-${String(m).padStart(2, "0")}-01`;
      const monthEnd = `${selectedYear}-${String(m).padStart(2, "0")}-31`;
      const mInRange = (d) => d && d >= monthStart && d <= monthEnd;
      return {
        month: m,
        newProjects: projects.filter(p => p.startDate && mInRange(p.startDate)).length,
        completedMs: allMs.filter(ms => ms.status === "완료" && ms.endDate && mInRange(ms.endDate)).length,
        meetingCount: meetings.filter(mt => mt.date && mInRange(mt.date)).length,
      };
    });
    // 프로젝트 구분
    const built = periodProjects.filter(p => p.type === "구축PJ").length;
    const operating = periodProjects.filter(p => p.type === "운영PJ").length;
    return {
      periodProjects, newProjects, completedProjects,
      allMs, completedMs, activeMs, defaultMsStats,
      periodMeetings, allDiscussions, resolvedDiscussions,
      discussionByStatus, repItems, repByDecision, repProcessed,
      monthly, built, operating,
    };
  }, [projects, meetings, range, selectedYear]);

  const monthlyMax = Math.max(1, ...stats.monthly.flatMap(m => [m.newProjects, m.completedMs, m.meetingCount]));

  return (
    <div className="space-y-5">
      <div>
        <h1 className="text-2xl font-bold text-gray-900">📊 보고서</h1>
        <p className="text-sm text-gray-500 mt-1">기간별 프로젝트 / 마일스톤 / 논의사항 처리 통계</p>
      </div>

      {/* 기간 선택 */}
      <div className="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3 flex-wrap">
        <div className="flex bg-gray-100 rounded-md p-1">
          <button onClick={() => setMode("year")}
            className={`px-3 py-1.5 rounded text-xs font-semibold ${mode === "year" ? "bg-white shadow-sm text-gray-900" : "text-gray-500 hover:text-gray-700"}`}>
            연도별
          </button>
          <button onClick={() => setMode("custom")}
            className={`px-3 py-1.5 rounded text-xs font-semibold ${mode === "custom" ? "bg-white shadow-sm text-gray-900" : "text-gray-500 hover:text-gray-700"}`}>
            기간 지정
          </button>
        </div>
        {mode === "year" ? (
          <select value={selectedYear} onChange={e => setSelectedYear(Number(e.target.value))}
            className="px-3 h-9 bg-gray-50 border border-gray-200 rounded-md text-sm font-bold outline-none">
            {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
          </select>
        ) : (
          <>
            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)}
              className="px-3 h-9 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none" />
            <span className="text-sm text-gray-400">~</span>
            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)}
              className="px-3 h-9 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none" />
          </>
        )}
        <span className="ml-auto text-sm font-bold text-orange-600">📅 {range.label}</span>
      </div>

      {/* KPI 카드 5개 */}
      <div className="grid grid-cols-2 xs:grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 md:gap-3">
        <KpiCard label="활성 프로젝트" value={stats.periodProjects.length}
          sub={`구축 ${stats.built} · 운영 ${stats.operating}`} color="#FF8800" />
        <KpiCard label="신규 프로젝트" value={stats.newProjects.length} sub="기간 내 시작" color="#3B82F6" />
        <KpiCard label="완료 프로젝트" value={stats.completedProjects.length} sub="status = 완료" color="#10B981" />
        <KpiCard label="완료 마일스톤" value={stats.completedMs.length} sub={`전체 ${stats.allMs.length}건 中`} color="#8B5CF6" />
        <KpiCard label="처리된 논의사항" value={stats.resolvedDiscussions.length}
          sub={`전체 ${stats.allDiscussions.length}건 中`} color="#EC4899" />
      </div>

      {/* 월별 추세 (연도 모드일 때만) */}
      {mode === "year" && (
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-semibold text-gray-900">📈 {selectedYear}년 월별 추세</h2>
            <div className="flex items-center gap-3 text-[11px] text-gray-500">
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-blue-500 rounded-sm" /> 신규 프로젝트</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-purple-500 rounded-sm" /> 완료 마일스톤</span>

          <div className="flex items-end gap-1 h-48">

                <div className="text-[10px] text-gray-500 font-semibold">{m.month}월</div>

      {/* 기본 마일스톤 15개 처리 통계 */}
      <div className="bg-white rounded-xl border border-gray-200 p-5">

            <h2 className="font-semibold text-gray-900">🚩 기본 마일스톤별 처리 현황</h2>

          </div>
        </div>
        <div className="space-y-1.5">
          {stats.defaultMsStats.map((ms, idx) => (
            <div key={ms.name} className="flex items-center gap-3">
              <div className="w-6 h-6 flex items-center justify-center bg-gray-100 text-gray-600 rounded text-[10px] font-bold flex-shrink-0">

              <div className="w-[260px] flex-shrink-0 text-xs font-semibold text-gray-800 truncate" title={ms.name}>

                {ms.total > 0 && (
                  <>

                <div className="absolute inset-0 flex items-center justify-end pr-3 gap-3 text-[11px] font-bold text-gray-700">
                  <span className="text-green-700">완료 {ms.completed}</span>
                  <span className="text-blue-700">진행중 {ms.inProgress}</span>
                  <span className="text-gray-500">/ 총 {ms.total}</span>
                </div>
              </div>
              <div className="w-12 text-right text-xs font-bold text-gray-700">{ms.completionRate}%</div>
            </div>

        </div>
      </div>

      {/* 논의사항 + 대표 결정 통계 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 md:gap-4">
        {/* 논의사항 상태별 분포 */}
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-semibold text-gray-900">💬 논의사항 처리 현황</h2>
            <span className="text-xs text-gray-500">총 {stats.allDiscussions.length}건</span>
          </div>
          {stats.allDiscussions.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">기간 내 논의사항이 없습니다</div>
          ) : (
            <div className="space-y-2">
              {DISCUSSION_STATUSES.map(s => {
                const cnt = stats.discussionByStatus[s.key] || 0;
                const pct = stats.allDiscussions.length === 0 ? 0 : (cnt / stats.allDiscussions.length) * 100;
                return (
                  <div key={s.key} className="flex items-center gap-3">
                    <div className="w-24 flex-shrink-0">
                      <span className="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-semibold whitespace-nowrap"
                        style={{ color: s.color, backgroundColor: s.bg }}>
                        {s.key}
                      </span>
                    </div>
                    <div className="flex-1 h-6 bg-gray-50 rounded-md overflow-hidden relative">
                      <div className="absolute inset-y-0 left-0 rounded-md" style={{ width: `${pct}%`, backgroundColor: s.color, opacity: 0.85 }} />
                      <div className="absolute inset-0 flex items-center justify-end pr-3">
                        <span className="text-[11px] font-bold text-gray-800">{cnt}건 · {pct.toFixed(0)}%</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* 대표 검토 처리 현황 */}
        <div className="bg-white rounded-xl border-2 border-purple-200 p-5">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="font-semibold text-gray-900">👔 대표 검토 처리 현황</h2>
              <p className="text-[11px] text-gray-500 mt-0.5">대표 검토 요청 {stats.repItems.length}건 中 처리 {stats.repProcessed.length}건</p>
            </div>
          </div>
          {stats.repItems.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">기간 내 대표 검토 요청이 없습니다</div>
          ) : (
            <>
              <div className="space-y-2 mb-4">
                {REP_DECISIONS.map(r => {
                  const cnt = stats.repByDecision[r.key] || 0;
                  const pct = stats.repItems.length === 0 ? 0 : (cnt / stats.repItems.length) * 100;
                  return (
                    <div key={r.key} className="flex items-center gap-3">
                      <div className="w-16 flex-shrink-0">
                        <span className="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-bold"
                          style={{ color: r.color, backgroundColor: r.bg }}>
                          {r.key}
                        </span>
                      </div>
                      <div className="flex-1 h-6 bg-gray-50 rounded-md overflow-hidden relative">
                        <div className="absolute inset-y-0 left-0 rounded-md" style={{ width: `${pct}%`, backgroundColor: r.color, opacity: 0.85 }} />
                        <div className="absolute inset-0 flex items-center justify-end pr-3">
                          <span className="text-[11px] font-bold text-gray-800">{cnt}건 · {pct.toFixed(0)}%</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* 처리율 인디케이터 */}
              <div className="pt-3 border-t border-gray-100">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-xs font-semibold text-gray-600">대표 처리율</span>
                  <span className="text-sm font-bold text-purple-700">
                    {stats.repItems.length === 0 ? 0 : Math.round((stats.repProcessed.length / stats.repItems.length) * 100)}%
                  </span>
                </div>
                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full bg-purple-500" style={{
                    width: `${stats.repItems.length === 0 ? 0 : (stats.repProcessed.length / stats.repItems.length) * 100}%`
                  }} />
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* 기간 내 신규/완료 프로젝트 리스트 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 md:gap-4">
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <h2 className="font-semibold text-gray-900 mb-3">🆕 기간 내 신규 프로젝트 ({stats.newProjects.length})</h2>
          {stats.newProjects.length === 0 ? (
            <div className="text-sm text-gray-400 py-6 text-center">없음</div>
          ) : (
            <div className="space-y-1.5 max-h-64 overflow-y-auto scrollbar-thin">
              {stats.newProjects.map(p => (
                <button key={p.id} onClick={() => onSelectProject(p)}
                  className="w-full text-left p-2.5 border border-gray-200 rounded-lg hover:border-orange-200 hover:bg-orange-50/30 transition flex items-center gap-2">
                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                    p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                  }`}>{p.type}</span>
                  <span className="font-semibold text-sm flex-1 truncate">{p.name}</span>
                  <span className="text-[11px] text-gray-500">{p.startDate}</span>
                </button>
              ))}
            </div>
          )}
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-5">
          <h2 className="font-semibold text-gray-900 mb-3">✅ 기간 내 완료 프로젝트 ({stats.completedProjects.length})</h2>
          {stats.completedProjects.length === 0 ? (
            <div className="text-sm text-gray-400 py-6 text-center">없음</div>
          ) : (
            <div className="space-y-1.5 max-h-64 overflow-y-auto scrollbar-thin">
              {stats.completedProjects.map(p => (
                <button key={p.id} onClick={() => onSelectProject(p)}
                  className="w-full text-left p-2.5 border border-gray-200 rounded-lg hover:border-emerald-200 hover:bg-emerald-50/30 transition flex items-center gap-2">
                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                    p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                  }`}>{p.type}</span>
                  <span className="font-semibold text-sm flex-1 truncate">{p.name}</span>
                  <span className="text-[11px] text-gray-500">{p.dueDate}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      <div className="text-2xl font-bold" style={{ color }}>{value}</div>

// ============== 팀 관리 뷰 ==============
function TeamsView({ teams, members, projects, onUpsertTeam, onDeleteTeam, onUpsertMember, onDeleteMember, onSelectPerson }) {
  const [showTeamModal, setShowTeamModal] = useState(false);
  const [editingTeam, setEditingTeam] = useState(null);
  const [showMemberModal, setShowMemberModal] = useState(false);
  const [editingMember, setEditingMember] = useState(null);
  const [filterTeam, setFilterTeam] = useState("");

  const sortedTeams = useMemo(() => [...teams].sort((a, b) => (a.order || 0) - (b.order || 0)), [teams]);
  const filteredMembers = useMemo(() =>
    members.filter(m => !filterTeam || m.teamId === Number(filterTeam))
      .sort((a, b) => {
        if (a.teamId !== b.teamId) return a.teamId - b.teamId;
        if (a.position === "팀장") return -1;
        if (b.position === "팀장") return 1;
        return (a.name || "").localeCompare(b.name || "");
      }),
    [members, filterTeam]);

  // 프로젝트 부하 (팀원별)
  const memberLoad = (name) => {
    const proj = projects.filter(p => {
      const all = [p.pm, p.uxui, p.dev].filter(Boolean).flatMap(s => s.split(",").map(x => x.trim()));
      return all.includes(name);
    });
    return { total: proj.length, active: proj.filter(p => !["완료", "보류", "월 비용 계약"].includes(p.status)).length };
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">팀 관리</h1>
          <p className="text-sm text-gray-500 mt-1">팀과 팀원을 관리하고 전체 조직도를 확인하세요</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => { setEditingTeam(null); setShowTeamModal(true); }}
            className="flex items-center gap-2 px-3 h-10 bg-blue-500 hover:bg-blue-600 text-white rounded-md text-sm font-medium transition">
            <Icon name="plus" size={16} /> 새 팀
          </button>
          <button onClick={() => { setEditingMember(null); setShowMemberModal(true); }}
            className="flex items-center gap-2 px-3 h-10 bg-orange-500 hover:bg-orange-600 text-white rounded-md text-sm font-medium transition">
            <Icon name="plus" size={16} /> 새 팀원
          </button>
        </div>
      </div>

      {/* 조직도 */}
      <div className="bg-white rounded-xl border border-gray-200 p-6">
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-bold text-gray-900">📊 전체 조직도</h2>
          <span className="text-xs text-gray-500">팀 {teams.length}개 · 팀원 {members.length}명</span>
        </div>

        {/* 회사 루트 */}
        <div className="flex flex-col items-center">
          <div className="px-6 py-3 bg-gradient-to-r from-orange-400 to-orange-600 text-white rounded-xl shadow-lg">
            <div className="text-xs font-semibold opacity-80">COMPANY</div>
            <div className="text-lg font-bold">Bridgeseven</div>
          </div>
          {/* 연결선 */}
          <div className="w-px h-6 bg-gray-300" />
          {sortedTeams.length > 0 && (
            <div className="w-full h-px bg-gray-300 relative" style={{ maxWidth: `${Math.min(100, 25 * sortedTeams.length)}%` }} />
          )}
          {/* 팀 row */}
          <div className="flex flex-wrap justify-center gap-4 w-full">
            {sortedTeams.map((team) => {
              const teamMembers = members.filter(m => m.teamId === team.id);
              const leader = teamMembers.find(m => m.position === "팀장");
              return (
                <div key={team.id} className="flex flex-col items-center" style={{ minWidth: 220, maxWidth: 280 }}>
                  <div className="w-px h-6 bg-gray-300" />
                  {/* 팀 박스 */}
                  <div className="w-full rounded-xl border-2 overflow-hidden shadow-sm"
                    style={{ borderColor: team.color }}>
                    <div className="px-4 py-2.5 text-white flex items-center justify-between"
                      style={{ backgroundColor: team.color }}>
                      <div>
                        <div className="font-bold text-sm">{team.name}</div>
                        {team.description && <div className="text-[10px] opacity-90">{team.description}</div>}
                      </div>
                      <span className="text-[10px] font-bold bg-white/20 px-2 py-0.5 rounded-full">{teamMembers.length}명</span>
                    </div>
                    <div className="bg-white p-3 space-y-2">
                      {leader && (
                        <button onClick={() => onSelectPerson(leader.name)}
                          className="w-full flex items-center gap-2 p-2 rounded-md bg-yellow-50 border border-yellow-200 hover:bg-yellow-100 transition text-left">
                          <Avatar name={leader.name} size={32} />
                          <div className="flex-1 min-w-0">
                            <div className="text-sm font-bold text-gray-900 flex items-center gap-1">
                              {leader.name}
                              <span className="text-[9px] bg-yellow-500 text-white px-1.5 py-0.5 rounded font-bold">팀장</span>
                            </div>
                            <div className="text-[10px] text-gray-600 truncate">{leader.title || "-"}</div>
                          </div>
                        </button>
                      )}
                      {teamMembers.filter(m => m.position !== "팀장").map((m) => (
                        <button key={m.id} onClick={() => onSelectPerson(m.name)}
                          className="w-full flex items-center gap-2 p-1.5 rounded-md hover:bg-gray-50 transition text-left">
                          <Avatar name={m.name} size={26} />
                          <div className="flex-1 min-w-0">
                            <div className="text-xs font-semibold text-gray-800 truncate">{m.name}</div>
                            <div className="text-[10px] text-gray-500 truncate">{m.title || m.position}</div>
                          </div>
                        </button>
                      ))}
                      {teamMembers.length === 0 && (
                        <div className="text-[11px] text-gray-400 text-center py-3 border border-dashed border-gray-200 rounded">
                          팀원 없음
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {sortedTeams.length === 0 && (
            <div className="text-sm text-gray-400 text-center py-8 mt-6 w-full">
              아직 등록된 팀이 없습니다. "새 팀" 버튼으로 추가하세요.
            </div>
          )}
        </div>
      </div>

      {/* 팀 관리 + 팀원 관리 panel */}
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-3 md:gap-4">
        {/* 팀 목록 */}
        <div className="bg-white rounded-xl border border-gray-200 p-5 lg:col-span-2">
          <h2 className="font-bold text-gray-900 mb-3">팀 목록 ({teams.length})</h2>
          <div className="space-y-2">
            {sortedTeams.map(t => {
              const cnt = members.filter(m => m.teamId === t.id).length;
              return (
                <div key={t.id} className="border border-gray-200 rounded-lg p-3 group hover:bg-gray-50 transition">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-md flex items-center justify-center text-white font-bold text-sm flex-shrink-0"
                      style={{ backgroundColor: t.color }}>
                      {t.name.slice(0, 2)}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-sm text-gray-900">{t.name}</div>
                      <div className="text-[11px] text-gray-500 truncate">{t.description || "-"} · {cnt}명</div>
                    </div>
                    <div className="opacity-0 group-hover:opacity-100 flex items-center gap-1">
                      <button onClick={() => { setEditingTeam(t); setShowTeamModal(true); }}
                        className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded">
                        <Icon name="edit" size={13} />
                      </button>
                      <button onClick={() => onDeleteTeam(t.id)}
                        className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">
                        <Icon name="trash" size={13} />
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 팀원 목록 */}
        <div className="bg-white rounded-xl border border-gray-200 p-5 lg:col-span-3">
          <div className="flex items-center justify-between mb-3 gap-2">
            <h2 className="font-bold text-gray-900">팀원 목록 ({filteredMembers.length})</h2>
            <select value={filterTeam} onChange={e => setFilterTeam(e.target.value)}
              className="px-2 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded outline-none">
              <option value="">전체 팀</option>
              {sortedTeams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div className="space-y-2 max-h-[600px] overflow-y-auto scrollbar-thin pr-1">
            {filteredMembers.map(m => {
              const team = teams.find(t => t.id === m.teamId);
              const load = memberLoad(m.name);
              return (
                <div key={m.id} className="border border-gray-200 rounded-lg p-3 group hover:bg-gray-50 transition">
                  <div className="flex items-center gap-3">
                    <Avatar name={m.name} size={36} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-sm text-gray-900">{m.name}</span>
                        {m.position === "팀장" && <span className="text-[9px] bg-yellow-500 text-white px-1.5 py-0.5 rounded font-bold">팀장</span>}
                        {team && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded" style={{ color: team.color, backgroundColor: team.color + "20" }}>{team.name}</span>}
                      </div>
                      <div className="text-[11px] text-gray-500 mt-0.5">
                        {m.position} · {m.title || "-"}
                        {m.email && <span className="ml-2">· {m.email}</span>}
                      </div>
                      <div className="text-[10px] text-gray-400 mt-0.5">
                        활성 {load.active}건 / 총 {load.total}건
                      </div>
                    </div>
                    <div className="opacity-0 group-hover:opacity-100 flex items-center gap-1">
                      <button onClick={() => { setEditingMember(m); setShowMemberModal(true); }}
                        className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded">
                        <Icon name="edit" size={13} />
                      </button>
                      <button onClick={() => onDeleteMember(m.id)}
                        className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">
                        <Icon name="trash" size={13} />
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
            {filteredMembers.length === 0 && (
              <div className="text-sm text-gray-400 text-center py-8">팀원이 없습니다</div>
            )}
          </div>
        </div>
      </div>

      {showTeamModal && (
        <TeamModal team={editingTeam} onClose={() => setShowTeamModal(false)}
          onSave={(t) => { onUpsertTeam(t); setShowTeamModal(false); }} />
      )}
      {showMemberModal && (
        <MemberModal member={editingMember} teams={teams}
          onClose={() => setShowMemberModal(false)}
          onSave={(m) => { onUpsertMember(m); setShowMemberModal(false); }} />
      )}
    </div>
  );
}

// 팀 추가/수정 모달
function TeamModal({ team, onClose, onSave }) {
  const PRESET_COLORS = ["#3B82F6", "#10B981", "#F59E0B", "#EF4444", "#8B5CF6", "#EC4899", "#06B6D4", "#84CC16"];
  const [form, setForm] = useState(team || { name: "", color: PRESET_COLORS[0], description: "" });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return (
    <Modal title={team ? "팀 수정" : "새 팀"} onClose={onClose} size="md">
      <div className="space-y-4">
        <Field label="팀 이름 *">
          <input type="text" value={form.name} onChange={e => set("name", e.target.value)}
            className="form-input" placeholder="예: 마케팅팀" autoFocus />
        </Field>
        <Field label="설명">
          <input type="text" value={form.description} onChange={e => set("description", e.target.value)}
            className="form-input" placeholder="예: 디지털 마케팅 및 광고 운영" />
        </Field>
        <Field label="대표 색상">
          <div className="flex gap-2 flex-wrap">
            {PRESET_COLORS.map(c => (
              <button key={c} type="button" onClick={() => set("color", c)}
                className={`w-9 h-9 rounded-lg transition ${form.color === c ? "ring-2 ring-offset-2" : "opacity-60 hover:opacity-100"}`}
                style={{ backgroundColor: c, ringColor: c }} />
            ))}
            <input type="color" value={form.color} onChange={e => set("color", e.target.value)}
              className="w-9 h-9 rounded-lg cursor-pointer border border-gray-200" />
          </div>
        </Field>
      </div>
      <ModalFooter onCancel={onClose}
        onSubmit={() => { if (!form.name.trim()) return alert("팀 이름을 입력하세요"); onSave(form); }} />
    </Modal>
  );
}

// 대표자 PIN 로그인 모달
function RepLoginModal({ onClose, onSubmit, isFirstTime }) {
  const [pin, setPin] = useState("");
  return (
    <Modal title={isFirstTime ? "대표자 PIN 설정 (최초)" : "대표자 로그인"} onClose={onClose} size="md">

// 담당자 드로어 - 클릭한 사람의 모든 프로젝트와 액션 표시
function PersonDrawer({ info, projects, meetings, onClose, onSelectProject }) {
  const { name, role } = info;
  const myProjects = useMemo(() => {
    const isMine = (p) => {
      const all = [p.pm, p.subPm, p.uxui, p.dev].filter(Boolean)
        .flatMap(s => s.split(",").map(x => x.trim()));
      return all.includes(name);
    };
    return {
      asPM:    projects.filter(p => p.pm === name),
      asSubPM: projects.filter(p => p.subPm === name),
      asUX:    projects.filter(p => p.uxui && p.uxui.split(",").map(s => s.trim()).includes(name)),
      asDev:   projects.filter(p => p.dev && p.dev.split(",").map(s => s.trim()).includes(name)),
      all:     projects.filter(isMine),
    };
  }, [name, role, projects]);
  const myActions = meetings.filter(m => m.owner === name && m.status !== "완료")
    .sort((a, b) => (a.deadline || "").localeCompare(b.deadline || ""));
  const totalActive = myProjects.all.filter(p => !["완료", "보류", "월 비용 계약"].includes(p.status)).length;

  const Section = ({ title, list }) => list.length === 0 ? null : (
    <div>
      <h4 className="text-xs font-bold text-gray-500 uppercase mb-2 mt-4">{title} ({list.length})</h4>
      <div className="space-y-1.5">
        {list.map(p => (
          <button key={p.id} onClick={() => onSelectProject(p)}
            className="w-full text-left p-2.5 border border-gray-200 rounded-lg hover:border-orange-200 hover:bg-orange-50/30 transition flex items-center gap-2">
            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
              p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
            }`}>{p.type}</span>
            <span className="font-semibold text-sm text-gray-800 flex-1 truncate">{p.name}</span>
            <StatusBadge status={p.status} />
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <div className="fixed inset-0 z-40 modal-overlay">
      <div onClick={onClose} className="absolute inset-0 bg-black/40" />
      <div className="absolute right-0 top-0 bottom-0 w-full max-w-full md:max-w-[560px] bg-white shadow-2xl modal-content overflow-y-auto scrollbar-thin">
        <div className="sticky top-0 bg-white border-b border-gray-200 z-10 px-6 h-14 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <Avatar name={name} size={36} />
            <div>
              <div className="font-bold text-gray-900">{name}</div>
              <div className="text-[11px] text-gray-500">{role} 담당 보기</div>
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-md">
            <Icon name="close" size={16} />
          </button>
        </div>
        <div className="p-6 space-y-2">
          <div className="grid grid-cols-3 gap-2 sm:gap-3">
            <DetailField label="총 프로젝트" value={`${myProjects.all.length}건`} />
            <DetailField label="활성" value={`${totalActive}건`} />
            <DetailField label="미완료 액션" value={`${myActions.length}건`} />
          </div>

          <Section title="PM 담당" list={myProjects.asPM} />
          <Section title="서브 PM 담당" list={myProjects.asSubPM} />
          <Section title="UX/UI 담당" list={myProjects.asUX} />
          <Section title="Dev 담당" list={myProjects.asDev} />

          {myActions.length > 0 && (
            <div>
              <h4 className="text-xs font-bold text-gray-500 uppercase mb-2 mt-4">진행중 액션 아이템 ({myActions.length})</h4>
              <div className="space-y-1.5">
                {myActions.slice(0, 10).map(m => {
                  const proj = projects.find(p => p.id === m.projectId);
                  return (
                    <div key={m.id} className="p-2.5 border border-gray-200 rounded-lg">
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-[11px] font-bold text-orange-700">{proj?.name || "-"}</span>
                        <ActionStatusBadge status={m.status} />
                      </div>
                      <div className="text-sm text-gray-800">{m.actions || m.agenda}</div>
                      {m.deadline && <div className="text-[11px] text-gray-500 mt-1">마감: {m.deadline}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// 마감 지연 상세 모달 (지연된 프로젝트 + 액션 아이템)
function OverdueDetailModal({ projects, meetings, onClose, onSelectProject }) {
  const today = new Date().toISOString().slice(0, 10);
  const overdueProjects = useMemo(() =>
    projects.filter(p => p.dueDate && p.dueDate < today && !["완료", "보류", "월 비용 계약"].includes(p.status))
      .sort((a, b) => a.dueDate.localeCompare(b.dueDate)),
    [projects]);
  const overdueMeetings = useMemo(() =>
    meetings.filter(m => m.deadline && m.deadline < today && m.status !== "완료")
      .sort((a, b) => a.deadline.localeCompare(b.deadline)),
    [meetings]);

  const total = overdueProjects.length + overdueMeetings.length;

  return (
    <Modal title={`마감 지연 상세 (${total}건)`} onClose={onClose} size="lg">
      {total === 0 ? (
        <div className="text-sm text-gray-400 py-12 text-center">
          🎉 지연된 항목이 없습니다
        </div>
      ) : (
        <div className="space-y-5">
          {/* 지연 프로젝트 */}
          <div>
            <h3 className="text-xs font-bold text-gray-500 uppercase mb-2">
              📁 지연된 프로젝트 ({overdueProjects.length})
            </h3>
            {overdueProjects.length === 0 ? (
              <div className="text-xs text-gray-400 py-3 text-center border border-dashed border-gray-200 rounded">없음</div>
            ) : (
              <div className="space-y-2">
                {overdueProjects.map(p => {
                  const days = Math.round((new Date(today) - new Date(p.dueDate)) / (1000 * 60 * 60 * 24));
                  return (
                    <button key={p.id} onClick={() => onSelectProject(p)}
                      className="w-full text-left p-3 border border-red-200 bg-red-50/30 rounded-lg hover:bg-red-50 transition">
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-2">
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                            p.type === "구축PJ" ? "bg-blue-50 text-blue-700" : "bg-emerald-50 text-emerald-700"
                          }`}>{p.type}</span>
                          <span className="font-bold text-gray-900">{p.name}</span>
                          <StatusBadge status={p.status} />
                        </div>
                        <div className="text-right">
                          <div className="text-xs text-gray-500">마감 {p.dueDate}</div>
                          <div className="text-sm font-bold text-red-600">{days}일 지연</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-3 text-xs text-gray-600">
                        <span>PM: <strong>{p.pm || "-"}</strong></span>
                        {p.subPm && <span>서브PM: <strong>{p.subPm}</strong></span>}
                        <span className="ml-auto font-bold">진척 {computeProgress(p)}%</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
          {/* 지연 액션 아이템 */}
          <div>
            <h3 className="text-xs font-bold text-gray-500 uppercase mb-2">
              ⚡ 지연된 액션 아이템 ({overdueMeetings.length})
            </h3>
            {overdueMeetings.length === 0 ? (
              <div className="text-xs text-gray-400 py-3 text-center border border-dashed border-gray-200 rounded">없음</div>
            ) : (
              <div className="space-y-2">
                {overdueMeetings.map(m => {
                  const proj = projects.find(p => p.id === m.projectId);
                  const days = Math.round((new Date(today) - new Date(m.deadline)) / (1000 * 60 * 60 * 24));
                  return (
                    <div key={m.id} className="p-3 border border-orange-200 bg-orange-50/30 rounded-lg">
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-2">
                          {proj && (
                            <button onClick={() => onSelectProject(proj)}
                              className="text-xs font-bold text-orange-700 bg-orange-100 px-2 py-0.5 rounded hover:bg-orange-200">
                              {proj.name}
                            </button>
                          )}
                          <ActionStatusBadge status={m.status} />
                        </div>
                        <div className="text-right">
                          <div className="text-xs text-gray-500">마감 {m.deadline}</div>
                          <div className="text-sm font-bold text-red-600">{days}일 지연</div>
                        </div>
                      </div>
                      <div className="text-sm font-semibold text-gray-800">{m.actions || m.agenda}</div>
                      {m.owner && <div className="text-xs text-gray-500 mt-1">담당: <strong>{m.owner}</strong></div>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </Modal>
  );
}

// ============== 모달 공통 ==============
function Modal({ title, onClose, size = "md", children }) {
  const sizes = { md: "max-w-[480px]", lg: "max-w-[680px]" };
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-2 sm:p-4 modal-overlay">
      <div onClick={onClose} className="absolute inset-0 bg-black/40" />
      <div className={`relative bg-white rounded-xl shadow-2xl w-full ${sizes[size]} modal-content max-h-[95vh] sm:max-h-[90vh] flex flex-col`}>
        <div className="flex items-center justify-between px-4 sm:px-6 h-14 border-b border-gray-200">
          <h2 className="font-bold text-gray-900 text-sm sm:text-base truncate pr-2">{title}</h2>
          <button onClick={onClose} className="p-1.5 hover:bg-gray-100 rounded-md flex-shrink-0">
            <Icon name="close" size={16} />
          </button>
        </div>
        <div className="p-4 sm:p-6 overflow-y-auto scrollbar-thin">{children}</div>
      </div>
    </div>
  );
}

    background: #F9FAFB;
